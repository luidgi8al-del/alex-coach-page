<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATHIA — Suivi coureur</title>
<style>
  :root {
    --teal: #0F6E56;
    --teal-light-bg: #E1F5EE;
    --teal-light-text: #9FE1CB;
    --text-primary: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-hint: #8a8a8a;
    --border: #e5e5e5;
    --border-light: #f0f0f0;
    --row2-bg: #fafafa;
    --blue: #185FA5;
    --orange: #BA7517;
    --zone-1: #3699F5;
    --zone-2: #FF8738;
    --zone-3: #58C97A;
    --zone-4: #EC70AD;
    --zone-5: #8E70E8;
    --zone-6: #35B8B3;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f4;
    color: var(--text-primary);
    margin: 0;
    padding: 0 0 40px;
  }
  .banner {
    background: var(--teal);
    padding: 20px 20px 14px;
    color: #fff;
  }
  .banner .brand { font-size: 20px; font-weight: 600; letter-spacing: 2px; margin: 0; }
  .banner .sub { color: var(--teal-light-text); font-size: 12.5px; margin-top: 4px; }
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 20px;
    margin-top: 14px;
    overflow-x: auto;
  }
  .tab {
    background: rgba(255,255,255,0.14);
    color: var(--teal-light-text);
    border: none;
    padding: 8px 14px;
    border-radius: 20px 20px 0 0;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { background: #f4f5f4; color: var(--teal); }
  .container { max-width: 680px; margin: 0 auto; padding: 18px 16px 0; }
  @media (min-width: 900px) {
    .container { max-width: 1440px; }
    #panel-apercu.apercu-grid.active { display: block; }
    .apercu-top { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; align-items: start; }
    .apercu-summary { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .empty, .error { color: var(--text-muted); padding: 60px 20px; text-align: center; font-size: 14px; }
  .error { color: #a32d2d; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .stat-grid > div { padding: 14px 6px; text-align: center; border-right: 0.5px solid var(--border); }
  .stat-grid > div:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--text-muted); }
  .stat-value { font-size: 18px; font-weight: 600; margin-top: 3px; }
  .stat-value.teal { color: var(--teal); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.orange { color: var(--orange); }

  .card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .card h3 { font-size: 13px; font-weight: 600; margin: 0 0 10px; }
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .zones-toolbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .zones-toolbar-label { display: block; color: var(--text-muted); font-size: 10.5px; margin-bottom: 5px; }
  .zones-periods { display: flex; flex-wrap: wrap; gap: 6px; }
  .zones-period-btn { border: 1px solid var(--border); background: #fff; color: var(--text-muted); border-radius: 16px; padding: 6px 11px; font: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; }
  .zones-period-btn.active { border-color: var(--teal); background: var(--teal-light-bg); color: var(--teal); }
  .zones-period-btn:disabled { cursor: default; opacity: .55; }
  .zones-compare-select, .zones-date-input { border: 1px solid var(--border); background: #fff; color: var(--text-primary); border-radius: 8px; padding: 6px 8px; font: inherit; font-size: 11.5px; }
  .zones-date-fields { display: none; align-items: flex-end; gap: 6px; }
  .zones-date-fields.visible { display: flex; }
  .zones-date-field label { display: block; color: var(--text-muted); font-size: 9.5px; margin-bottom: 3px; }
  .zones-range { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--text-muted); font-size: 10.5px; margin-bottom: 9px; }
  .zones-range strong { color: var(--text-primary); font-weight: 600; }
  .zones-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .zone-card { margin-bottom: 0; min-width: 0; }
  .zone-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .zone-card-title { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
  .zone-card-icon { color: var(--teal); font-size: 16px; }
  .zone-total { text-align: right; font-size: 16px; font-weight: 600; white-space: nowrap; }
  .zone-total small { display: block; color: var(--text-hint); font-size: 9.5px; font-weight: 400; margin-top: 1px; }
  .zone-total small.zone-estimated { color: var(--orange); }
  .zone-overview { display: grid; grid-template-columns: 132px minmax(0, 1fr); gap: 12px; align-items: center; margin-bottom: 7px; }
  .zone-donut { width: 132px; height: 132px; border-radius: 50%; display: grid; place-items: center; }
  .zone-donut-center { width: 54%; height: 54%; border-radius: 50%; display: grid; place-content: center; text-align: center; background: #fff; }
  .zone-donut-value { font-size: 18px; font-weight: 600; }
  .zone-donut-label { color: var(--text-muted); font-size: 9.5px; margin-top: 1px; }
  .zone-insight { font-size: 13px; font-weight: 600; line-height: 1.25; }
  .zone-allocation { display: flex; height: 14px; border-radius: 8px; overflow: hidden; background: var(--border-light); margin: 8px 0 6px; }
  .zone-allocation span { min-width: 1px; }
  .zone-insight-sub { color: var(--text-muted); font-size: 10.5px; line-height: 1.35; }
  .zone-detail-row { display: grid; grid-template-columns: minmax(94px, 1.15fr) minmax(70px, 1fr) 72px; gap: 8px; align-items: center; min-height: 33px; border-top: 1px solid var(--border-light); font-size: 11.5px; }
  .zone-detail-label { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .zone-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .zone-mini-track { height: 6px; border-radius: 4px; overflow: hidden; background: var(--border); }
  .zone-mini-fill { height: 100%; min-width: 1px; border-radius: 4px; }
  .zone-detail-value { text-align: right; font-weight: 600; white-space: nowrap; }
  .zone-legacy-note { color: var(--orange); font-size: 10.5px; margin-bottom: 8px; }
  .zone-color-1 { background: var(--zone-1); }
  .zone-color-2 { background: var(--zone-2); }
  .zone-color-3 { background: var(--zone-3); }
  .zone-color-4 { background: var(--zone-4); }
  .zone-color-5 { background: var(--zone-5); }
  .zone-color-6 { background: var(--zone-6); }
  @media (min-width: 900px) {
    .zones-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 560px) {
    .zone-overview { grid-template-columns: 104px minmax(0, 1fr); }
    .zone-donut { width: 104px; height: 104px; }
    .zone-detail-row { grid-template-columns: minmax(88px, 1fr) minmax(45px, .75fr) 65px; gap: 5px; }
  }

  .planning-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .planning-month-nav { display: flex; align-items: center; gap: 7px; }
  .planning-month-button {
    width: 30px;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--teal);
    cursor: pointer;
    font-size: 16px;
  }
  .planning-month-button:disabled { color: var(--text-hint); cursor: default; opacity: .55; }
  .planning-month-select {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text-primary);
    padding: 6px 9px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
  }
  .planning-month-context { color: var(--text-muted); font-size: 10.5px; }
  .planning-month-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
  }
  .planning-stat {
    background: #fff;
    border: .5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
  }
  .planning-stat-label { color: var(--text-muted); font-size: 10px; }
  .planning-stat-value { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .planning-stat-note { color: var(--text-hint); font-size: 9.5px; font-weight: 400; }
  .planning-table-wrap {
    background: #fff;
    border: .5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .planning-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .planning-table th {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    padding: 8px 12px;
    text-align: left;
    background: var(--row2-bg);
  }
  .planning-table td {
    border-top: 1px solid var(--border-light);
    font-size: 12px;
    padding: 9px 12px;
    vertical-align: middle;
  }
  .planning-table th.numeric, .planning-table td.numeric { text-align: right; }
  .planning-table .week-row { cursor: pointer; }
  .planning-table .week-row:hover, .planning-table .week-row.open { background: var(--teal-light-bg); }
  .planning-week-label { display: block; font-weight: 600; }
  .planning-week-range { color: var(--text-hint); display: block; font-size: 9.5px; margin-top: 2px; }
  .planning-load { min-width: 110px; }
  .planning-load-value { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .planning-load-track { height: 6px; margin-top: 4px; border-radius: 4px; background: var(--border-light); overflow: hidden; }
  .planning-load-fill { height: 100%; border-radius: 4px; background: var(--teal); }
  .planning-week-toggle {
    border: 0;
    background: transparent;
    color: var(--teal);
    cursor: pointer;
    font-size: 16px;
    padding: 3px 6px;
  }
  .planning-detail {
    display: none;
    background: #fff;
    border: .5px solid var(--border);
    border-radius: 12px;
    margin-top: 10px;
    padding: 12px;
  }
  .planning-detail.open { display: block; }
  .planning-detail-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .planning-detail-title { font-size: 13px; font-weight: 600; }
  .planning-detail-sub { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
  .planning-detail-close {
    border: 1px solid var(--teal);
    border-radius: 7px;
    background: #fff;
    color: var(--teal);
    cursor: pointer;
    padding: 6px 9px;
    font: inherit;
    font-size: 10.5px;
    font-weight: 600;
  }
  .planning-days { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
  .planning-day {
    min-width: 0;
    border-left: 1px solid var(--border-light);
    border-top: 1px solid var(--border-light);
    padding: 8px;
  }
  .planning-day:first-child { border-left: 0; }
  .planning-day.today { background: var(--teal-light-bg); }
  .planning-day-head { display: flex; align-items: center; justify-content: space-between; gap: 5px; margin-bottom: 8px; }
  .planning-day-title { font-size: 10.5px; font-weight: 600; }
  .planning-day-count { color: var(--text-hint); font-size: 9px; }
  .planning-session {
    border-left: 3px solid var(--teal);
    padding-left: 7px;
    margin-top: 9px;
  }
  .planning-session:first-child { margin-top: 0; }
  .planning-session-title { font-size: 10.5px; font-weight: 600; line-height: 1.25; }
  .planning-session-meta { color: var(--text-muted); font-size: 9.5px; line-height: 1.35; margin-top: 3px; }
  .planning-session-extra { color: var(--text-hint); font-size: 9px; line-height: 1.35; margin-top: 2px; }
  .planning-rest { color: var(--text-hint); font-size: 9.5px; }
  @media (max-width: 900px) {
    .planning-days { grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); }
  }
  @media (max-width: 620px) {
    .planning-toolbar { align-items: flex-start; flex-direction: column; }
    .planning-month-stats { grid-template-columns: 1fr; gap: 6px; }
    .planning-table th:nth-child(4), .planning-table td:nth-child(4),
    .planning-table th:nth-child(5), .planning-table td:nth-child(5) { display: none; }
    .planning-table th, .planning-table td { padding: 8px 7px; }
  }
  .foot { max-width: 680px; margin: 18px auto 0; padding: 0 16px; font-size: 11.5px; color: var(--text-hint); }
  .health-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .health-periods { display: flex; gap: 6px; flex-wrap: wrap; }
  .health-period {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-muted);
    border-radius: 16px;
    padding: 6px 11px;
    font: inherit;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .health-period.active { border-color: var(--teal); background: var(--teal-light-bg); color: var(--teal); }
  .health-range { color: var(--text-muted); font-size: 10.5px; }
  .health-stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 10px; }
  .health-stat { margin: 0; padding: 11px 14px; }
  .health-stat-label { color: var(--text-muted); font-size: 10.5px; }
  .health-stat-value { font-size: 20px; font-weight: 600; margin: 3px 0; }
  .health-stat-context { display: flex; flex-wrap: wrap; gap: 5px 14px; color: var(--text-muted); font-size: 10px; }
  .health-stat-context strong { color: var(--text-primary); font-weight: 600; }
  .health-chart-card { display: grid; gap: 7px; margin-bottom: 10px; padding: 11px 14px 8px; }
  .health-chart-head, .health-chart-meta, .health-signals-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .health-chart-title { font-size: 13px; font-weight: 600; }
  .health-chart-sub, .health-chart-meta { color: var(--text-muted); font-size: 10px; }
  .health-chart-meta { flex-wrap: wrap; }
  .health-legend { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 14px; }
  .health-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .health-legend-line { width: 18px; height: 3px; background: var(--teal); }
  .health-legend-line.heart { background: #D4537E; }
  .health-legend-band { width: 18px; height: 9px; background: var(--teal-light-bg); }
  .health-tsb-badge { background: var(--teal-light-bg); color: var(--teal); border-radius: 14px; padding: 5px 9px; font-size: 10px; white-space: nowrap; }
  .health-chart-svg { display: block; width: 100%; height: auto; max-height: 300px; }
  .health-chart-svg .grid { stroke: var(--border); stroke-width: 1; }
  .health-chart-svg .band { fill: var(--teal-light-bg); }
  .health-chart-svg .reference { stroke: var(--text-hint); stroke-width: 1; stroke-dasharray: 5 5; }
  .health-chart-svg .sleep-line, .health-chart-svg .heart-line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  .health-chart-svg .sleep-line { stroke: var(--teal); }
  .health-chart-svg .heart-line { stroke: #D4537E; }
  .health-chart-svg .sleep-point { fill: var(--teal); }
  .health-chart-svg .heart-point { fill: #D4537E; }
  .health-chart-svg text { fill: var(--text-muted); font-size: 10px; }
  .health-chart-svg .axis-title, .health-chart-svg .latest { fill: var(--text-primary); font-weight: 600; }
  .health-signals { margin-top: 2px; }
  .health-signals-title { font-size: 13px; font-weight: 600; }
  .health-signals-sub { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
  .health-signals-toggle {
    border: 1px solid var(--teal);
    background: #fff;
    color: var(--teal);
    border-radius: 7px;
    padding: 6px 10px;
    font: inherit;
    font-size: 10.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .health-signals-toggle:disabled { border-color: var(--border); color: var(--text-hint); cursor: default; }
  .health-signals-details { display: none; margin-top: 8px; }
  .health-signals-details.open { display: block; }
  .health-rule { color: var(--text-muted); font-size: 10px; margin-bottom: 5px; }
  .health-signal-table { width: 100%; border-collapse: collapse; }
  .health-signal-table th { color: var(--text-muted); font-size: 9.5px; font-weight: 500; text-align: left; padding: 6px 8px; }
  .health-signal-table td { border-top: 1px solid var(--border-light); font-size: 10.5px; padding: 7px 8px; }
  .health-signal-table .numeric { text-align: right; white-space: nowrap; }
  .health-signal-reading { color: var(--text-muted); }
  @media (max-width: 620px) {
    .health-toolbar, .health-chart-head, .health-signals-head { align-items: flex-start; flex-direction: column; }
    .health-stat-grid { grid-template-columns: 1fr; }
    .health-signal-table th:nth-child(3), .health-signal-table td:nth-child(3) { display: none; }
  }

  .chart-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    min-height: 16px;
  }
  .chart-detail b { color: var(--text-primary); }
  canvas { cursor: crosshair; touch-action: none; }

  .pheno-badge {
    display: inline-block;
    align-self: flex-start;
    background: var(--teal-light-bg);
    color: var(--teal);
    font-weight: 600;
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 6px;
  }
  .pheno-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; }
  .pheno-fortfaible { display: flex; gap: 16px; font-size: 12px; margin-bottom: 14px; }
  .pheno-fortfaible b { color: var(--text-primary); }
  .axe-row { margin-bottom: 12px; }
  .axe-row:last-child { margin-bottom: 0; }
  .axes-list { min-height: 0; }
  .axe-head { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
  .axe-head .axe-nom { font-weight: 600; }
  .axe-head .axe-cat { color: var(--text-muted); }
  .axe-bar-wrap { height: 10px; background: var(--border-light); border-radius: 5px; overflow: hidden; }
  .axe-bar { height: 100%; border-radius: 5px; background: var(--teal); }
  .axe-foot { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-hint); margin-top: 3px; }

  .zone-avg { font-size: 10.5px; color: var(--text-hint); margin-top: 1px; }

  .apercu-top { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .apercu-col { min-width: 0; }
  .apercu-summary { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 2px; }
  .summary-card { min-height: 210px; margin-bottom: 0; }
  .summary-card h3 { font-size: 14px; margin-bottom: 14px; }
  .profile-card { margin-bottom: 0; }
  .fitness-card { margin-bottom: 0; }
  .status-pill {
    display: inline-block; padding: 6px 12px; border-radius: 20px;
    background: #FEF3DD; color: #9A5B00; font-size: 12px; font-weight: 700;
  }
  .status-pill.good { background: var(--teal-light-bg); color: var(--teal); }
  .status-pill.alert { background: #FCE8E6; color: #A32D2D; }
  .summary-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 14px 0; }
  .summary-metric { text-align: center; padding: 8px 4px; border-right: 1px solid var(--border-light); }
  .summary-metric:last-child { border-right: none; }
  .metric-icon { display: block; color: var(--teal); font-size: 23px; font-style: normal; line-height: 1; margin-bottom: 7px; }
  .summary-metric span { display: block; color: var(--text-muted); font-size: 10px; margin-bottom: 4px; }
  .summary-metric b { font-size: 13px; }
  .recommendation { border-top: 1px dashed var(--border); padding-top: 12px; font-size: 12px; line-height: 1.45; }
  .progress-line { margin: 13px 0; }
  .progress-head { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 5px; }
  .progress-track { height: 7px; background: var(--border-light); border-radius: 6px; overflow: hidden; }
  .progress-value { height: 100%; background: #2FA84A; border-radius: 6px; }
  .week-foot { display: flex; justify-content: space-between; gap: 8px; border-top: 1px dashed var(--border); padding-top: 12px; font-size: 11px; color: var(--text-muted); }

    width: 100%; min-height: 76px; resize: vertical; border: 1px solid var(--border);

<body>
  <div class="banner">
    <p class="brand">ATHIA</p>
    <div class="sub" id="subtitle">Chargement...</div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="apercu">Aperçu</button>
      <button class="tab" data-tab="planning">Planning</button>
      <button class="tab" data-tab="zones">Zones</button>
      <button class="tab" data-tab="sante">Santé</button>
    </div>
  </div>
  <div class="container">
    <div class="panel active" id="panel-apercu"></div>
    <div class="panel" id="panel-planning"></div>
    <div class="panel" id="panel-zones"></div>
    <div class="panel" id="panel-sante"></div>
  </div>
  <div class="foot" id="foot" style="display:none">Onglet Planning : touche une semaine pour voir le détail par jour.</div>

  <script>
    const SUPABASE_URL = "https://zhemtpvyhkbmjmydocux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mkVgshuPAO07VYIgv6dKtw_UdoLJGro";

    function isoWeekLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const day = (d.getDay() + 6) % 7;
      const monday = new Date(d);
      monday.setDate(d.getDate() - day);
      const dd = String(monday.getDate()).padStart(2, "0");
      const mm = String(monday.getMonth() + 1).padStart(2, "0");
      return { key: monday.toISOString().slice(0, 10), label: `Semaine du ${dd}/${mm}` };
    }

    function jourLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const jours = ["dim", "lun", "mar", "mer", "jeu", "ven", "sam"];
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${jours[d.getDay()]} ${dd}/${mm}`;
    }

    function fmt(v, unit) {
      return (v === null || v === undefined)
        ? '<span class="metric-value muted">--</span>'
        : `<span class="metric-value">${v}${unit}</span>`;
    }

    function dureeLabel(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return h > 0 ? `${h}h${String(m).padStart(2, "0")}` : `${m} min`;
    }

    function setupTabs() {
      document.body.classList.add("apercu-active");
      document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(`panel-${btn.dataset.tab}`).classList.add("active");
          document.body.classList.toggle("apercu-active", btn.dataset.tab === "apercu");
          document.getElementById("foot").style.display = btn.dataset.tab === "planning" ? "block" : "none";
        });
      });
    }

    // Sur grand écran, le panneau Aperçu passe en 2 colonnes : Profil coureur à gauche,
    // CTL/ATL/TSB + courbe à droite (voir @media (min-width: 900px) plus haut). Les deux
    // fonctions écrivent chacune dans leur colonne (#apercu-col-profil / #apercu-col-forme),
    // créées une fois ici pour que l'ordre DOM (donc l'ordre visuel) reste stable.
    function ensureApercuColumns() {
      const panel = document.getElementById("panel-apercu");
      panel.classList.add("apercu-grid");
      panel.innerHTML = `
        <div class="apercu-top">
          <div class="apercu-col" id="apercu-col-profil"></div>
          <div class="apercu-col" id="apercu-col-forme"></div>
        </div>
        <div class="apercu-summary" id="apercu-summary"></div>
        <div class="sync-strip" id="sync-strip"></div>
      `;
    }

    function renderProfilCoureur(profileRow) {
      const col = document.getElementById("apercu-col-profil");
      if (!profileRow || !profileRow.phenotype || !profileRow.axes || profileRow.axes.length === 0) return;
      const card = document.createElement("div");
      card.className = "card profile-card";
      const fortFaible = (profileRow.point_fort || profileRow.point_faible) ? `
        <div class="pheno-fortfaible">
          ${profileRow.point_fort ? `<span>Point fort : <b>${profileRow.point_fort}</b></span>` : ""}
          ${profileRow.point_faible ? `<span>À travailler : <b>${profileRow.point_faible}</b></span>` : ""}
        </div>` : "";
      const axesHtml = profileRow.axes.map(a => {
        const score = Math.max(0, Math.min(100, a.score || 0));
        const color = score >= 67 ? "#2FA84A" : score >= 44 ? "#185FA5" : score >= 22 ? "#E8A33D" : "#8a8a8a";
        const wkgTxt = a.wkg != null ? `${a.wkg.toFixed(2)} W/kg` : "—";
        return `
          <div class="axe-row">
            <div class="axe-head">
              <span class="axe-nom">${a.nom} <span style="color:var(--text-hint);font-weight:400">(${a.duree})</span></span>
              <span class="axe-cat">${a.categorie}</span>
            </div>
            <div class="axe-bar-wrap"><div class="axe-bar" style="width:${score.toFixed(0)}%;background:${color}"></div></div>
            <div class="axe-foot"><span>${wkgTxt}${a.watts != null ? " · " + a.watts + " W" : ""}</span><span>${score.toFixed(0)}/100</span></div>
          </div>`;
      }).join("");
      card.innerHTML = `
        <h3>Profil coureur</h3>
        <div class="pheno-badge">${profileRow.phenotype}</div>
        <div class="pheno-desc">${profileRow.phenotype_description || ""}</div>
        ${fortFaible}
        <div class="axes-list">${axesHtml}</div>
      `;
      col.appendChild(card);
    }

    function renderApercu(metricsRows) {
      const panel = document.getElementById("apercu-col-forme");
      if (!metricsRows || metricsRows.length === 0) {
        panel.innerHTML = '<div class="empty">Pas encore de données de forme partagées.</div>';
        return;
      }
      const dernier = metricsRows[0];
      const precedent = metricsRows[1] || null;
      const trend = (value, previous) => {
        if (value == null || previous == null) return "";
        const delta = Math.round(value - previous);
        return `${delta > 0 ? "+" : ""}${delta} vs hier`;
      };
      const tsbLabel = dernier.tsb == null ? "" :
        dernier.tsb < -20 ? "Fatigue élevée" :
        dernier.tsb < -10 ? "Fatigue modérée" :
        dernier.tsb <= 10 ? "Équilibre" : "Bonne fraîcheur";
      const stats = document.createElement("div");
      stats.className = "stat-grid";
      stats.innerHTML = `
        <div><div class="stat-label">CTL</div><div class="stat-value blue">${dernier.ctl != null ? Math.round(dernier.ctl) : "--"}</div><div class="stat-trend">${trend(dernier.ctl, precedent?.ctl)}</div></div>
        <div><div class="stat-label">ATL</div><div class="stat-value orange">${dernier.atl != null ? Math.round(dernier.atl) : "--"}</div><div class="stat-trend">${trend(dernier.atl, precedent?.atl)}</div></div>
        <div><div class="stat-label">TSB <span title="Forme au début de la journée, calculée depuis le CTL et l'ATL de la veille">ⓘ</span></div><div class="stat-value teal">${dernier.tsb != null ? (dernier.tsb >= 0 ? "+" : "") + Math.round(dernier.tsb) : "--"}</div><div class="stat-trend">${tsbLabel}</div></div>
        <div><div class="stat-label">Date</div><div class="stat-value" style="font-size:13px">${jourLabel(dernier.date)}</div></div>
      `;
      panel.appendChild(stats);

      const card = document.createElement("div");
      card.className = "card fitness-card";
      card.innerHTML = `
        <h3>Forme au fil du temps (90 jours)</h3>
        <div class="legend">
          <span><span class="dot" style="background:var(--blue)"></span>CTL (fitness)</span>
          <span><span class="dot" style="background:var(--orange)"></span>ATL (fatigue)</span>
          <span><span class="dot" style="background:var(--teal)"></span>TSB (forme)</span>
        </div>
        <canvas id="chart-forme" width="900" height="250"></canvas>
        <div class="chart-detail" id="chart-forme-detail">Touche la courbe pour voir un jour précis.</div>
      `;
      panel.appendChild(card);

      drawFitnessChart(metricsRows.slice(0, 90).reverse());
    }

    function startOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      return d;
    }

    function sumRows(rows) {
      return (rows || []).reduce((acc, r) => {
        acc.charge += Number(r.charge || 0);
        acc.duration += Number(r.duration_min || 0);
        acc.distance += Number(r.distance_km || 0);
        acc.count += 1;
        return acc;
      }, { charge: 0, duration: 0, distance: 0, count: 0 });
    }

    function renderOverviewSummary(summaryRows, metricsRows, messagesRows, token) {
      const wrap = document.getElementById("apercu-summary");
      const latestMetric = metricsRows?.[0] || null;
      const latestHealth = (metricsRows || []).find(r => r.sleep_hours != null || r.resting_hr != null) || null;
      const previousHealth = (metricsRows || []).find((r, i) => i > 0 && (r.sleep_hours != null || r.resting_hr != null)) || null;
      const now = new Date();
      const monday = startOfWeek(now);
      const previousMonday = new Date(monday); previousMonday.setDate(previousMonday.getDate() - 7);
      const currentRows = (summaryRows || []).filter(r => new Date(r.activity_date + "T00:00:00") >= monday);
      const previousRows = (summaryRows || []).filter(r => {
        const d = new Date(r.activity_date + "T00:00:00");
        return d >= previousMonday && d < monday;
      });
      const current = sumRows(currentRows);
      const previous = sumRows(previousRows);
      const weeklyTarget = Math.max(100, Math.round((latestMetric?.ctl || Math.max(current.charge / 7, 1)) * 7));
      const progress = Math.min(100, Math.round(current.charge / weeklyTarget * 100));
      const weekDelta = previous.charge > 0 ? Math.round((current.charge - previous.charge) / previous.charge * 100) : null;
      const tsb = latestMetric?.tsb;
      const state = tsb == null ? "Données insuffisantes" : tsb < -20 ? "Fatigue élevée" : tsb < -10 ? "Fatigue modérée" : tsb <= 10 ? "Équilibre" : "Bonne fraîcheur";
      const stateClass = tsb != null && tsb < -20 ? "alert" : tsb != null && tsb > 10 ? "good" : "";
      const recommendation = tsb == null ? "Synchronise davantage de données pour obtenir une recommandation." :
        tsb < -20 ? "Réduire fortement la charge et privilégier la récupération." :
        tsb < -10 ? "Privilégier récupération ou endurance légère aujourd’hui." :
        tsb <= 10 ? "Charge maîtrisée : entraînement normal avec surveillance du ressenti." :
        "Bonne fenêtre pour une séance de qualité si les sensations sont bonnes.";
      const rhrDelta = latestHealth?.resting_hr != null && previousHealth?.resting_hr != null
        ? latestHealth.resting_hr - previousHealth.resting_hr : null;
      const last = (summaryRows || [])[0] || null;
      const durationTarget = Math.max(60, Math.round(weeklyTarget * 0.85));
      const durationProgress = Math.min(100, Math.round(current.duration / durationTarget * 100));
      const sessionTarget = Math.max(current.count, previous.count || 1);

      wrap.innerHTML = `
        <div class="card summary-card">
          <h3>État actuel</h3>
          <span class="status-pill ${stateClass}">${state}</span>
          <div class="summary-metrics">
            <div class="summary-metric"><i class="metric-icon">☾</i><span>Sommeil</span><b>${latestHealth?.sleep_hours != null ? latestHealth.sleep_hours.toFixed(1) + " h" : "--"}</b></div>
            <div class="summary-metric"><i class="metric-icon">♡</i><span>Évolution FC</span><b>${rhrDelta == null ? "stable" : (rhrDelta > 0 ? "+" : "") + rhrDelta + " bpm"}</b></div>
            <div class="summary-metric"><i class="metric-icon">♥</i><span>FC repos</span><b>${latestHealth?.resting_hr != null ? latestHealth.resting_hr + " bpm" : "--"}</b></div>
          </div>
          <div class="recommendation">ⓘ &nbsp;${recommendation}</div>
        </div>
        <div class="card summary-card">
          <h3>Cette semaine</h3>
          <div class="week-overview">
            <div class="progress-ring" style="--progress:${progress}%">
              <div class="progress-ring-content"><b>${progress} %</b><span>complété</span></div>
            </div>
            <div class="week-kpis">
              <div class="progress-line">
                <div class="progress-head"><span>▱ &nbsp;Charge</span><b>${current.charge} / ${weeklyTarget}</b></div>
                <div class="progress-track"><div class="progress-value" style="width:${progress}%"></div></div>
              </div>
              <div class="progress-line">
                <div class="progress-head"><span>◷ &nbsp;Durée</span><b>${dureeLabel(current.duration)} / ${dureeLabel(durationTarget)}</b></div>
                <div class="progress-track"><div class="progress-value" style="width:${durationProgress}%"></div></div>
              </div>
            </div>
          </div>
          <div class="week-foot"><span>▣ &nbsp;${current.count}/${sessionTarget} séances</span><span>${current.distance.toFixed(0)} km</span><span>${weekDelta == null ? "Pas de comparaison" : `${weekDelta > 0 ? "+" : ""}${weekDelta} % vs sem. préc.`}</span></div>
        </div>
        <div class="card summary-card">
          <h3>Séances</h3>
          <div class="session-section-label">Dernière séance</div>
          ${last ? `<div class="session-box"><div class="session-title">♧ &nbsp;${escapeHtml(last.type || "Sortie")}</div><div class="session-main">${dureeLabel(last.duration_min || 0)} · ${(Number(last.distance_km || 0)).toFixed(1)} km · Charge ${last.charge || 0}</div><div class="session-date">${jourLabel(last.activity_date)}${last.avg_power != null ? " · " + last.avg_power + " W" : ""}${last.avg_hr != null ? " · " + last.avg_hr + " bpm" : ""}</div></div>` : '<div class="session-box"><div class="session-main">Aucune séance partagée.</div></div>'}
          <div class="session-section-label">Prochaine séance</div>
          <div class="session-box next"><div class="session-title">⌁ &nbsp;Planning ATHIA</div><div class="session-main">Consulte le planning détaillé du sportif.</div></div>
          <button class="outline-button" id="open-planning">Voir le planning</button>
        </div>
        <div class="card summary-card" id="coach-message-card"></div>
      `;
      renderCoachMessageComposer(messagesRows || [], token);
      document.getElementById("open-planning")?.addEventListener("click", () => {
        document.querySelector('.tab[data-tab="planning"]')?.click();
      });

      const newestDate = latestMetric?.date || last?.activity_date;
      document.getElementById("sync-strip").innerHTML = `
        <span>↻ Données au ${newestDate ? jourLabel(newestDate) : "--"}</span>
        <span>Activités : ATHIA</span><span>Charge : ATHIA / Intervals.icu</span>
        <span>Santé : Health Connect</span><span style="color:var(--teal)">✓ Partage actif</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    }

    function renderCoachMessageComposer(messagesRows, token) {
      const card = document.getElementById("coach-message-card");
      if (!card) return;
      const history = messagesRows.slice(0, 1).map(m => `
        <div class="message-row"><b>${escapeHtml(m.category || "Conseil")}</b> · ${escapeHtml((m.body || "").slice(0, 70))}${(m.body || "").length > 70 ? "…" : ""}<span class="read-badge">${m.read_at ? "Lu" : "Envoyé"}</span></div>`).join("");
      card.innerHTML = `
        <h3>Message au sportif</h3>

          <div class="coach-form-row">
            <select id="coach-message-category"><option>Conseil</option><option>Information</option><option>Action demandée</option></select>
            <select id="coach-message-priority"><option value="normal">Normal</option><option value="important">Important</option><option value="urgent">Urgent</option></select>

          <button class="coach-send" id="coach-message-send">Envoyer le message</button>
          <div class="coach-feedback" id="coach-message-feedback"></div>

      document.getElementById("coach-message-send").addEventListener("click", async () => {

        if (body.length < 2) { feedback.textContent = "Écris un message avant de l’envoyer."; return; }
        button.disabled = true; feedback.textContent = "Envoi…";
        const result = await rpc("send_coach_message", token, {

          p_priority: document.getElementById("coach-message-priority").value
        });

        renderCoachMessageComposer(refreshed, token);
