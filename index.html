<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATHIA — Suivi coureur</title>
<style>
  :root {
    --teal: #0F6E56;
    --teal-light-bg: #E1F5EE;
    --teal-light-text: #9FE1CB;
    --text-primary: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-hint: #8a8a8a;
    --border: #e5e5e5;
    --border-light: #f0f0f0;
    --row2-bg: #fafafa;
    --blue: #185FA5;
    --orange: #BA7517;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f4;
    color: var(--text-primary);
    margin: 0;
    padding: 0 0 40px;
  }
  .banner {
    background: var(--teal);
    padding: 20px 20px 14px;
    color: #fff;
  }
  .banner .brand { font-size: 20px; font-weight: 600; letter-spacing: 2px; margin: 0; }
  .banner .sub { color: var(--teal-light-text); font-size: 12.5px; margin-top: 4px; }
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 20px;
    margin-top: 14px;
    overflow-x: auto;
  }
  .tab {
    background: rgba(255,255,255,0.14);
    color: var(--teal-light-text);
    border: none;
    padding: 8px 14px;
    border-radius: 20px 20px 0 0;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { background: #f4f5f4; color: var(--teal); }
  .container { max-width: 680px; margin: 0 auto; padding: 18px 16px 0; }
  @media (min-width: 900px) {
    .container { max-width: 1440px; }
    #panel-apercu.apercu-grid.active { display: block; }
    .apercu-top { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; align-items: start; }
    .apercu-summary { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .empty, .error { color: var(--text-muted); padding: 60px 20px; text-align: center; font-size: 14px; }
  .error { color: #a32d2d; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .stat-grid > div { padding: 14px 6px; text-align: center; border-right: 0.5px solid var(--border); }
  .stat-grid > div:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--text-muted); }
  .stat-value { font-size: 18px; font-weight: 600; margin-top: 3px; }
  .stat-value.teal { color: var(--teal); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.orange { color: var(--orange); }

  .card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .card h3 { font-size: 13px; font-weight: 600; margin: 0 0 10px; }
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .zone-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; }
  .zone-row .zone-label { width: 76px; color: var(--text-muted); flex-shrink: 0; }
  .zone-row .zone-bar-wrap { flex: 1; height: 8px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
  .zone-row .zone-bar { height: 100%; background: var(--teal); border-radius: 4px; }
  .zone-row .zone-value { width: 56px; text-align: right; font-weight: 600; flex-shrink: 0; }

  .week-card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .week-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
  }
  .week-head:hover { background: #fafafa; }
  .week-head .label { font-size: 14px; font-weight: 600; }
  .chev { display: inline-block; margin-left: 8px; color: var(--text-hint); font-size: 11px; transition: transform 0.15s; }
  .chev.open { transform: rotate(90deg); }
  .week-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 0.5px solid var(--border);
  }
  .week-stats > div { padding: 10px 6px; text-align: center; border-right: 0.5px solid var(--border); }
  .week-stats > div:last-child { border-right: none; }
  .week-stats .stat-label { font-size: 10px; color: var(--text-muted); }
  .week-stats .stat-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .week-stats .stat-value.accent { color: var(--teal); }
  .detail-wrap { display: none; padding: 12px 16px 14px; border-top: 0.5px solid var(--border); }
  .detail-wrap.open { display: block; }
  .day-card {
    border: 0.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .day-card:last-child { margin-bottom: 0; }
  .day-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    background: var(--teal-light-bg);
  }
  .day-head .day-title { font-size: 12.5px; font-weight: 600; }
  .day-head .day-type { font-size: 10.5px; color: var(--teal); }
  .metric-row {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    border-top: 0.5px solid var(--border-light);
  }
  .metric-row.row2 { background: var(--row2-bg); }
  .metric-row > div { padding: 8px 4px; text-align: center; border-right: 0.5px solid var(--border-light); }
  .metric-row > div:last-child { border-right: none; }
  .metric-label { font-size: 9px; color: var(--text-hint); }
  .metric-value { font-size: 11.5px; font-weight: 600; margin-top: 2px; }
  .metric-value.muted { color: var(--text-hint); font-weight: 400; }
  .foot { max-width: 680px; margin: 18px auto 0; padding: 0 16px; font-size: 11.5px; color: var(--text-hint); }
  .santé-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-top: 0.5px solid var(--border-light);
    font-size: 13px;
  }
  .santé-row:first-child { border-top: none; }
  .santé-row .santé-date { color: var(--text-muted); }
  .santé-row .santé-values { display: flex; gap: 16px; font-weight: 600; }

  .chart-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    min-height: 16px;
  }
  .chart-detail b { color: var(--text-primary); }
  canvas { cursor: crosshair; touch-action: none; }

  .month-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0 10px;
    cursor: pointer;
  }
  .month-toggle:first-of-type { margin-top: 4px; }
  .month-toggle .month-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .month-toggle .month-line { flex: 1; height: 1px; background: var(--border); }
  .month-toggle .month-chev { color: var(--text-hint); font-size: 11px; transition: transform 0.15s; }
  .month-toggle .month-chev.open { transform: rotate(90deg); }
  .month-weeks { display: none; }
  .month-weeks.open { display: block; }

  .pheno-badge {
    display: inline-block;
    background: var(--teal-light-bg);
    color: var(--teal);
    font-weight: 600;
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 6px;
  }
  .pheno-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; }
  .pheno-fortfaible { display: flex; gap: 16px; font-size: 12px; margin-bottom: 14px; }
  .pheno-fortfaible b { color: var(--text-primary); }
  .axe-row { margin-bottom: 12px; }
  .axe-row:last-child { margin-bottom: 0; }
  .axe-head { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
  .axe-head .axe-nom { font-weight: 600; }
  .axe-head .axe-cat { color: var(--text-muted); }
  .axe-bar-wrap { height: 10px; background: var(--border-light); border-radius: 5px; overflow: hidden; }
  .axe-bar { height: 100%; border-radius: 5px; background: var(--teal); }
  .axe-foot { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-hint); margin-top: 3px; }

  .zone-avg { font-size: 10.5px; color: var(--text-hint); margin-top: 1px; }

  .apercu-top { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .apercu-col { min-width: 0; }
  .apercu-summary { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 2px; }
  .summary-card { min-height: 210px; margin-bottom: 0; }
  .summary-card h3 { font-size: 14px; margin-bottom: 14px; }
  .status-pill {
    display: inline-block; padding: 6px 12px; border-radius: 20px;
    background: #FEF3DD; color: #9A5B00; font-size: 12px; font-weight: 700;
  }
  .status-pill.good { background: var(--teal-light-bg); color: var(--teal); }
  .status-pill.alert { background: #FCE8E6; color: #A32D2D; }
  .summary-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 18px 0; }
  .summary-metric { text-align: center; padding: 8px 4px; border-right: 1px solid var(--border-light); }
  .summary-metric:last-child { border-right: none; }
  .summary-metric span { display: block; color: var(--text-muted); font-size: 10px; margin-bottom: 4px; }
  .summary-metric b { font-size: 13px; }
  .recommendation { border-top: 1px dashed var(--border); padding-top: 12px; font-size: 12px; line-height: 1.45; }
  .progress-line { margin: 13px 0; }
  .progress-head { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 5px; }
  .progress-track { height: 7px; background: var(--border-light); border-radius: 6px; overflow: hidden; }
  .progress-value { height: 100%; background: #2FA84A; border-radius: 6px; }
  .week-foot { display: flex; justify-content: space-between; gap: 8px; border-top: 1px dashed var(--border); padding-top: 12px; font-size: 11px; color: var(--text-muted); }
  .session-box { border: 1px solid #B8DDCF; background: #F4FBF8; border-radius: 10px; padding: 11px; }
  .session-box .session-title { color: var(--teal); font-weight: 700; font-size: 12px; }
  .session-box .session-main { margin-top: 5px; font-size: 12px; line-height: 1.45; }
  .session-box .session-date { margin-top: 4px; color: var(--text-muted); font-size: 10.5px; }
  .coach-form textarea {
    width: 100%; min-height: 76px; resize: vertical; border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 10px; font: inherit; font-size: 12px; line-height: 1.4;
  }
  .coach-form textarea:focus { outline: 2px solid rgba(15,110,86,.18); border-color: var(--teal); }
  .coach-form-row { display: flex; gap: 8px; margin: 8px 0; }
  .coach-form select { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 7px; background: #fff; font-size: 11px; }
  .coach-send {
    width: 100%; border: none; border-radius: 8px; padding: 9px 12px; background: var(--teal);
    color: #fff; font-weight: 700; font-size: 12px; cursor: pointer;
  }
  .coach-send:disabled { opacity: .55; cursor: wait; }
  .coach-feedback { min-height: 15px; margin-top: 6px; font-size: 10.5px; color: var(--text-muted); }
  .message-history { border-top: 1px dashed var(--border); margin-top: 10px; padding-top: 8px; }
  .message-row { font-size: 10.5px; padding: 5px 0; color: var(--text-muted); }
  .message-row b { color: var(--text-primary); }
  .read-badge { float: right; color: var(--teal); }
  .sync-strip {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 18px; margin: 16px 0 0;
    padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: #fff;
    color: var(--text-muted); font-size: 10.5px;
  }
  .stat-trend { margin-top: 2px; font-size: 9.5px; color: var(--text-muted); }
  @media (max-width: 899px) {
    .apercu-summary { margin-bottom: 16px; }
    .summary-card { min-height: 0; }
  }
</style>
</head>
<body>
  <div class="banner">
    <p class="brand">ATHIA</p>
    <div class="sub" id="subtitle">Chargement...</div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="apercu">Aperçu</button>
      <button class="tab" data-tab="planning">Planning</button>
      <button class="tab" data-tab="zones">Zones</button>
      <button class="tab" data-tab="sante">Santé</button>
    </div>
  </div>
  <div class="container">
    <div class="panel active" id="panel-apercu"></div>
    <div class="panel" id="panel-planning"></div>
    <div class="panel" id="panel-zones"></div>
    <div class="panel" id="panel-sante"></div>
  </div>
  <div class="foot" id="foot" style="display:none">Onglet Planning : touche une semaine pour voir le détail par jour.</div>

  <script>
    const SUPABASE_URL = "https://zhemtpvyhkbmjmydocux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mkVgshuPAO07VYIgv6dKtw_UdoLJGro";

    function isoWeekLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const day = (d.getDay() + 6) % 7;
      const monday = new Date(d);
      monday.setDate(d.getDate() - day);
      const dd = String(monday.getDate()).padStart(2, "0");
      const mm = String(monday.getMonth() + 1).padStart(2, "0");
      return { key: monday.toISOString().slice(0, 10), label: `Semaine du ${dd}/${mm}` };
    }

    function jourLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const jours = ["dim", "lun", "mar", "mer", "jeu", "ven", "sam"];
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${jours[d.getDay()]} ${dd}/${mm}`;
    }

    function fmt(v, unit) {
      return (v === null || v === undefined)
        ? '<span class="metric-value muted">--</span>'
        : `<span class="metric-value">${v}${unit}</span>`;
    }

    function dureeLabel(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return h > 0 ? `${h}h${String(m).padStart(2, "0")}` : `${m} min`;
    }

    function setupTabs() {
      document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(`panel-${btn.dataset.tab}`).classList.add("active");
          document.getElementById("foot").style.display = btn.dataset.tab === "planning" ? "block" : "none";
        });
      });
    }

    // Sur grand écran, le panneau Aperçu passe en 2 colonnes : Profil coureur à gauche,
    // CTL/ATL/TSB + courbe à droite (voir @media (min-width: 900px) plus haut). Les deux
    // fonctions écrivent chacune dans leur colonne (#apercu-col-profil / #apercu-col-forme),
    // créées une fois ici pour que l'ordre DOM (donc l'ordre visuel) reste stable.
    function ensureApercuColumns() {
      const panel = document.getElementById("panel-apercu");
      panel.classList.add("apercu-grid");
      panel.innerHTML = `
        <div class="apercu-top">
          <div class="apercu-col" id="apercu-col-profil"></div>
          <div class="apercu-col" id="apercu-col-forme"></div>
        </div>
        <div class="apercu-summary" id="apercu-summary"></div>
        <div class="sync-strip" id="sync-strip"></div>
      `;
    }

    function renderProfilCoureur(profileRow) {
      const col = document.getElementById("apercu-col-profil");
      if (!profileRow || !profileRow.phenotype || !profileRow.axes || profileRow.axes.length === 0) return;
      const card = document.createElement("div");
      card.className = "card";
      const fortFaible = (profileRow.point_fort || profileRow.point_faible) ? `
        <div class="pheno-fortfaible">
          ${profileRow.point_fort ? `<span>Point fort : <b>${profileRow.point_fort}</b></span>` : ""}
          ${profileRow.point_faible ? `<span>À travailler : <b>${profileRow.point_faible}</b></span>` : ""}
        </div>` : "";
      const axesHtml = profileRow.axes.map(a => {
        const score = Math.max(0, Math.min(100, a.score || 0));
        const color = score >= 67 ? "#2FA84A" : score >= 44 ? "#185FA5" : score >= 22 ? "#E8A33D" : "#8a8a8a";
        const wkgTxt = a.wkg != null ? `${a.wkg.toFixed(2)} W/kg` : "—";
        return `
          <div class="axe-row">
            <div class="axe-head">
              <span class="axe-nom">${a.nom} <span style="color:var(--text-hint);font-weight:400">(${a.duree})</span></span>
              <span class="axe-cat">${a.categorie}</span>
            </div>
            <div class="axe-bar-wrap"><div class="axe-bar" style="width:${score.toFixed(0)}%;background:${color}"></div></div>
            <div class="axe-foot"><span>${wkgTxt}${a.watts != null ? " · " + a.watts + " W" : ""}</span><span>${score.toFixed(0)}/100</span></div>
          </div>`;
      }).join("");
      card.innerHTML = `
        <h3>Profil coureur</h3>
        <div class="pheno-badge">${profileRow.phenotype}</div>
        <div class="pheno-desc">${profileRow.phenotype_description || ""}</div>
        ${fortFaible}
        ${axesHtml}
      `;
      col.appendChild(card);
    }

    function renderApercu(metricsRows) {
      const panel = document.getElementById("apercu-col-forme");
      if (!metricsRows || metricsRows.length === 0) {
        panel.innerHTML = '<div class="empty">Pas encore de données de forme partagées.</div>';
        return;
      }
      const dernier = metricsRows[0];
      const precedent = metricsRows[1] || null;
      const trend = (value, previous) => {
        if (value == null || previous == null) return "";
        const delta = Math.round(value - previous);
        return `${delta > 0 ? "+" : ""}${delta} vs hier`;
      };
      const tsbLabel = dernier.tsb == null ? "" :
        dernier.tsb < -20 ? "Fatigue élevée" :
        dernier.tsb < -10 ? "Fatigue modérée" :
        dernier.tsb <= 10 ? "Équilibre" : "Bonne fraîcheur";
      const stats = document.createElement("div");
      stats.className = "stat-grid";
      stats.innerHTML = `
        <div><div class="stat-label">CTL</div><div class="stat-value blue">${dernier.ctl != null ? Math.round(dernier.ctl) : "--"}</div><div class="stat-trend">${trend(dernier.ctl, precedent?.ctl)}</div></div>
        <div><div class="stat-label">ATL</div><div class="stat-value orange">${dernier.atl != null ? Math.round(dernier.atl) : "--"}</div><div class="stat-trend">${trend(dernier.atl, precedent?.atl)}</div></div>
        <div><div class="stat-label">TSB <span title="Forme au début de la journée, calculée depuis le CTL et l'ATL de la veille">ⓘ</span></div><div class="stat-value teal">${dernier.tsb != null ? (dernier.tsb >= 0 ? "+" : "") + Math.round(dernier.tsb) : "--"}</div><div class="stat-trend">${tsbLabel}</div></div>
        <div><div class="stat-label">Date</div><div class="stat-value" style="font-size:13px">${jourLabel(dernier.date)}</div></div>
      `;
      panel.appendChild(stats);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>Forme au fil du temps (90 jours)</h3>
        <div class="legend">
          <span><span class="dot" style="background:var(--blue)"></span>CTL (fitness)</span>
          <span><span class="dot" style="background:var(--orange)"></span>ATL (fatigue)</span>
          <span><span class="dot" style="background:var(--teal)"></span>TSB (forme)</span>
        </div>
        <canvas id="chart-forme" width="600" height="220" style="width:100%;height:180px"></canvas>
        <div class="chart-detail" id="chart-forme-detail">Touche la courbe pour voir un jour précis.</div>
      `;
      panel.appendChild(card);

      drawLineChart({
        canvasId: "chart-forme",
        detailId: "chart-forme-detail",
        rows: metricsRows.slice(0, 90).reverse(),
        series: [
          { key: "ctl", color: "#185FA5" },
          { key: "atl", color: "#BA7517" },
          { key: "tsb", color: "#0F6E56" }
        ],
        formatDetail: (r) => `<b>${jourLabel(r.date)}</b> — CTL ${r.ctl != null ? Math.round(r.ctl) : "--"} · ATL ${r.atl != null ? Math.round(r.atl) : "--"} · TSB ${r.tsb != null ? (r.tsb >= 0 ? "+" : "") + Math.round(r.tsb) : "--"}`
      });
    }

    function startOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      return d;
    }

    function sumRows(rows) {
      return (rows || []).reduce((acc, r) => {
        acc.charge += Number(r.charge || 0);
        acc.duration += Number(r.duration_min || 0);
        acc.distance += Number(r.distance_km || 0);
        acc.count += 1;
        return acc;
      }, { charge: 0, duration: 0, distance: 0, count: 0 });
    }

    function renderOverviewSummary(summaryRows, metricsRows, messagesRows, token) {
      const wrap = document.getElementById("apercu-summary");
      const latestMetric = metricsRows?.[0] || null;
      const latestHealth = (metricsRows || []).find(r => r.sleep_hours != null || r.resting_hr != null) || null;
      const previousHealth = (metricsRows || []).find((r, i) => i > 0 && (r.sleep_hours != null || r.resting_hr != null)) || null;
      const now = new Date();
      const monday = startOfWeek(now);
      const previousMonday = new Date(monday); previousMonday.setDate(previousMonday.getDate() - 7);
      const currentRows = (summaryRows || []).filter(r => new Date(r.activity_date + "T00:00:00") >= monday);
      const previousRows = (summaryRows || []).filter(r => {
        const d = new Date(r.activity_date + "T00:00:00");
        return d >= previousMonday && d < monday;
      });
      const current = sumRows(currentRows);
      const previous = sumRows(previousRows);
      const weeklyTarget = Math.max(100, Math.round((latestMetric?.ctl || Math.max(current.charge / 7, 1)) * 7));
      const progress = Math.min(100, Math.round(current.charge / weeklyTarget * 100));
      const weekDelta = previous.charge > 0 ? Math.round((current.charge - previous.charge) / previous.charge * 100) : null;
      const tsb = latestMetric?.tsb;
      const state = tsb == null ? "Données insuffisantes" : tsb < -20 ? "Fatigue élevée" : tsb < -10 ? "Fatigue modérée" : tsb <= 10 ? "Équilibre" : "Bonne fraîcheur";
      const stateClass = tsb != null && tsb < -20 ? "alert" : tsb != null && tsb > 10 ? "good" : "";
      const recommendation = tsb == null ? "Synchronise davantage de données pour obtenir une recommandation." :
        tsb < -20 ? "Réduire fortement la charge et privilégier la récupération." :
        tsb < -10 ? "Privilégier récupération ou endurance légère aujourd’hui." :
        tsb <= 10 ? "Charge maîtrisée : entraînement normal avec surveillance du ressenti." :
        "Bonne fenêtre pour une séance de qualité si les sensations sont bonnes.";
      const rhrDelta = latestHealth?.resting_hr != null && previousHealth?.resting_hr != null
        ? latestHealth.resting_hr - previousHealth.resting_hr : null;
      const last = (summaryRows || [])[0] || null;

      wrap.innerHTML = `
        <div class="card summary-card">
          <h3>État actuel</h3>
          <span class="status-pill ${stateClass}">${state}</span>
          <div class="summary-metrics">
            <div class="summary-metric"><span>Sommeil</span><b>${latestHealth?.sleep_hours != null ? latestHealth.sleep_hours.toFixed(1) + " h" : "--"}</b></div>
            <div class="summary-metric"><span>FC repos</span><b>${latestHealth?.resting_hr != null ? latestHealth.resting_hr + " bpm" : "--"}</b></div>
            <div class="summary-metric"><span>Évolution FC</span><b>${rhrDelta == null ? "--" : (rhrDelta > 0 ? "+" : "") + rhrDelta + " bpm"}</b></div>
          </div>
          <div class="recommendation">${recommendation}</div>
        </div>
        <div class="card summary-card">
          <h3>Cette semaine</h3>
          <div class="progress-line">
            <div class="progress-head"><span>Charge</span><b>${current.charge} / cible ${weeklyTarget}</b></div>
            <div class="progress-track"><div class="progress-value" style="width:${progress}%"></div></div>
          </div>
          <div class="progress-line">
            <div class="progress-head"><span>Durée</span><b>${dureeLabel(current.duration)}</b></div>
            <div class="progress-track"><div class="progress-value" style="width:${Math.min(100, current.duration / 600 * 100)}%"></div></div>
          </div>
          <div class="week-foot"><span>${current.count} séance(s)</span><span>${current.distance.toFixed(0)} km</span><span>${weekDelta == null ? "Pas de comparaison" : `${weekDelta > 0 ? "+" : ""}${weekDelta} % vs semaine précédente`}</span></div>
        </div>
        <div class="card summary-card">
          <h3>Dernière séance</h3>
          ${last ? `<div class="session-box"><div class="session-title">${escapeHtml(last.type || "Sortie")}</div><div class="session-main">${dureeLabel(last.duration_min || 0)} · ${(Number(last.distance_km || 0)).toFixed(1)} km · Charge ${last.charge || 0}</div><div class="session-date">${jourLabel(last.activity_date)}${last.avg_power != null ? " · " + last.avg_power + " W" : ""}${last.avg_hr != null ? " · " + last.avg_hr + " bpm" : ""}</div></div>` : '<div class="empty" style="padding:30px 0">Aucune séance partagée.</div>'}
          <div class="recommendation">Le détail complet reste disponible dans l’onglet Planning.</div>
        </div>
        <div class="card summary-card" id="coach-message-card"></div>
      `;
      renderCoachMessageComposer(messagesRows || [], token);

      const newestDate = latestMetric?.date || last?.activity_date;
      document.getElementById("sync-strip").innerHTML = `
        <span>↻ Données au ${newestDate ? jourLabel(newestDate) : "--"}</span>
        <span>Activités : ATHIA</span><span>Charge : ATHIA / Intervals.icu</span>
        <span>Santé : Health Connect</span><span style="color:var(--teal)">✓ Partage actif</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    }

    function renderCoachMessageComposer(messagesRows, token) {
      const card = document.getElementById("coach-message-card");
      if (!card) return;
      const history = messagesRows.slice(0, 3).map(m => `
        <div class="message-row"><b>${escapeHtml(m.category || "Conseil")}</b> · ${escapeHtml((m.body || "").slice(0, 70))}${(m.body || "").length > 70 ? "…" : ""}<span class="read-badge">${m.read_at ? "Lu" : "Envoyé"}</span></div>`).join("");
      card.innerHTML = `
        <h3>Message au sportif</h3>
        <div class="coach-form">
          <textarea id="coach-message-body" maxlength="1000" placeholder="Écris une consigne, un conseil ou une modification à proposer…"></textarea>
          <div class="coach-form-row">
            <select id="coach-message-category"><option>Conseil</option><option>Information</option><option>Action demandée</option></select>
            <select id="coach-message-priority"><option value="normal">Normal</option><option value="important">Important</option><option value="urgent">Urgent</option></select>
          </div>
          <button class="coach-send" id="coach-message-send">Envoyer le message</button>
          <div class="coach-feedback" id="coach-message-feedback"></div>
        </div>
        ${history ? `<div class="message-history">${history}</div>` : ""}`;
      document.getElementById("coach-message-send").addEventListener("click", async () => {
        const button = document.getElementById("coach-message-send");
        const feedback = document.getElementById("coach-message-feedback");
        const body = document.getElementById("coach-message-body").value.trim();
        if (body.length < 2) { feedback.textContent = "Écris un message avant de l’envoyer."; return; }
        button.disabled = true; feedback.textContent = "Envoi…";
        const result = await rpc("send_coach_message", token, {
          p_body: body,
          p_category: document.getElementById("coach-message-category").value,
          p_priority: document.getElementById("coach-message-priority").value
        });
        if (result === null) {
          feedback.textContent = "Envoi impossible. Vérifie que la migration Supabase des messages est installée.";
          button.disabled = false;
          return;
        }
        const refreshed = await rpc("get_coach_messages", token) || [];
        renderCoachMessageComposer(refreshed, token);
        document.getElementById("coach-message-feedback").textContent = "Message envoyé.";
      });
    }

    // Trace 1..N courbes sur un canvas, avec detection du point le plus proche au
    // clic/tap pour afficher le detail du jour sous le graphe.
    function drawLineChart({ canvasId, detailId, rows, series, formatDetail }) {
      const canvas = document.getElementById(canvasId);
      const detailEl = document.getElementById(detailId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (rows.length < 2) {
        if (detailEl) detailEl.textContent = "Pas encore assez de jours pour tracer une courbe.";
        return;
      }

      const allValues = rows.flatMap(r => series.map(s => r[s.key] || 0));
      const minV = Math.min(...allValues, 0);
      const maxV = Math.max(...allValues, 10);
      const pad = 10;
      const x = i => pad + (i / (rows.length - 1)) * (w - pad * 2);
      const y = v => h - pad - ((v - minV) / (maxV - minV || 1)) * (h - pad * 2);

      series.forEach(s => {
        ctx.beginPath();
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        rows.forEach((r, i) => {
          const v = r[s.key];
          if (v === null || v === undefined) return;
          const px = x(i), py = y(v);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();
      });

      let markerX = null;
      const drawMarker = () => {
        ctx.clearRect(0, 0, w, h);
        series.forEach(s => {
          ctx.beginPath();
          ctx.strokeStyle = s.color;
          ctx.lineWidth = 2;
          rows.forEach((r, i) => {
            const v = r[s.key];
            if (v === null || v === undefined) return;
            const px = x(i), py = y(v);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          });
          ctx.stroke();
        });
        if (markerX !== null) {
          ctx.strokeStyle = "#8a8a8a";
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(markerX, pad);
          ctx.lineTo(markerX, h - pad);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      };

      const handlePointer = (clientX) => {
        const rect = canvas.getBoundingClientRect();
        const relX = (clientX - rect.left) / rect.width * w;
        const idx = Math.round((relX - pad) / (w - pad * 2) * (rows.length - 1));
        const clamped = Math.max(0, Math.min(rows.length - 1, idx));
        markerX = x(clamped);
        drawMarker();
        if (detailEl) detailEl.innerHTML = formatDetail(rows[clamped]);
      };

      canvas.addEventListener("mousemove", (e) => handlePointer(e.clientX));
      canvas.addEventListener("click", (e) => handlePointer(e.clientX));
      canvas.addEventListener("touchstart", (e) => { handlePointer(e.touches[0].clientX); }, { passive: true });
      canvas.addEventListener("touchmove", (e) => { handlePointer(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    }

    // Période affichée dans l'onglet Zones : "total" (cumul depuis le début) ou une moyenne
    // par semaine/mois/année. Un seul sélecteur pour les deux cartes (puissance + FC).
    let zonesPeriode = "total";
    let zonesRowCache = null;

    const ZONES_PERIODES = [
      { id: "total", label: "Total" },
      { id: "semaine", label: "Semaine" },
      { id: "mois", label: "Mois" },
      { id: "annee", label: "Année" }
    ];

    function zoneValeur(z, periode) {
      switch (periode) {
        case "semaine": return z.avgMinPerWeek;
        case "mois": return z.avgMinPerMonth;
        case "annee": return z.avgMinPerYear;
        default: return z.minutes;
      }
    }

    function renderZones(zonesRow) {
      zonesRowCache = zonesRow;
      const panel = document.getElementById("panel-zones");
      if (!zonesRow || (!zonesRow.power_zones?.length && !zonesRow.hr_zones?.length)) {
        panel.innerHTML = '<div class="empty">Pas encore de répartition par zones partagée.</div>';
        return;
      }

      const tabsHtml = `
        <div class="tabs" style="padding:0;margin:0 0 14px;background:transparent">
          ${ZONES_PERIODES.map(p => `<button class="tab zones-periode-tab${p.id === zonesPeriode ? " active" : ""}" data-periode="${p.id}" style="color:${p.id === zonesPeriode ? "var(--teal)" : "var(--text-muted)"};background:${p.id === zonesPeriode ? "var(--teal-light-bg)" : "var(--border-light)"}">${p.label}</button>`).join("")}
        </div>`;

      const renderZoneCard = (title, zones) => {
        if (!zones || zones.length === 0) return "";
        const values = zones.map(z => zoneValeur(z, zonesPeriode) || 0);
        const maxV = Math.max(...values, 1);
        const rows = zones.map((z, i) => `
          <div class="zone-row">
            <div class="zone-label">${z.label}</div>
            <div style="flex:1">
              <div class="zone-bar-wrap"><div class="zone-bar" style="width:${(values[i] / maxV * 100).toFixed(0)}%"></div></div>
            </div>
            <div class="zone-value">${dureeLabel(Math.round(values[i]))}</div>
          </div>`).join("");
        return `<div class="card"><h3>${title}</h3>${rows}</div>`;
      };

      panel.innerHTML = tabsHtml +
        renderZoneCard("Zones de puissance", zonesRow.power_zones) +
        renderZoneCard("Zones de fréquence cardiaque", zonesRow.hr_zones);

      panel.querySelectorAll(".zones-periode-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          zonesPeriode = btn.dataset.periode;
          renderZones(zonesRowCache);
        });
      });
    }

    function renderSante(metricsRows) {
      const panel = document.getElementById("panel-sante");
      const avecSante = (metricsRows || []).filter(r => r.sleep_hours != null || r.resting_hr != null);
      if (avecSante.length === 0) {
        panel.innerHTML = '<div class="empty">Pas encore de données de santé partagées.</div>';
        return;
      }

      panel.innerHTML = `
        <div class="card">
          <h3>Sommeil (30 derniers jours)</h3>
          <canvas id="chart-sommeil" width="600" height="180" style="width:100%;height:150px"></canvas>
          <div class="chart-detail" id="chart-sommeil-detail">Touche la courbe pour voir un jour précis.</div>
        </div>
        <div class="card">
          <h3>FC repos (30 derniers jours)</h3>
          <canvas id="chart-fcrepos" width="600" height="180" style="width:100%;height:150px"></canvas>
          <div class="chart-detail" id="chart-fcrepos-detail">Touche la courbe pour voir un jour précis.</div>
        </div>
        <div class="card"><h3>Historique</h3><div id="sante-list"></div></div>
      `;

      const sur30 = avecSante.slice(0, 30).reverse();
      drawLineChart({
        canvasId: "chart-sommeil",
        detailId: "chart-sommeil-detail",
        rows: sur30,
        series: [{ key: "sleep_hours", color: "#0F6E56" }],
        formatDetail: (r) => `<b>${jourLabel(r.date)}</b> — ${r.sleep_hours != null ? r.sleep_hours.toFixed(1) + " h de sommeil" : "pas de donnée"}`
      });
      drawLineChart({
        canvasId: "chart-fcrepos",
        detailId: "chart-fcrepos-detail",
        rows: sur30,
        series: [{ key: "resting_hr", color: "#D4537E" }],
        formatDetail: (r) => `<b>${jourLabel(r.date)}</b> — ${r.resting_hr != null ? r.resting_hr + " bpm au repos" : "pas de donnée"}`
      });

      document.getElementById("sante-list").innerHTML = avecSante.slice(0, 30).map(r => `
        <div class="santé-row">
          <span class="santé-date">${jourLabel(r.date)}</span>
          <span class="santé-values">
            ${r.sleep_hours != null ? `<span>${r.sleep_hours.toFixed(1)} h</span>` : ""}
            ${r.resting_hr != null ? `<span>${r.resting_hr} bpm</span>` : ""}
          </span>
        </div>
      `).join("");
    }

    let semaineOuverteIdx = null;

    function renderPlanning(rows) {
      const panel = document.getElementById("panel-planning");
      if (!rows || rows.length === 0) {
        panel.innerHTML = '<div class="empty">Lien valide, mais aucune sortie enregistrée pour le moment.</div>';
        return;
      }

      const semaines = new Map();
      for (const r of rows) {
        const w = isoWeekLabel(r.activity_date);
        if (!semaines.has(w.key)) {
          semaines.set(w.key, { label: w.label, sorties: 0, dureeMin: 0, distanceKm: 0, charge: 0, jours: [] });
        }
        const s = semaines.get(w.key);
        s.sorties += 1;
        s.dureeMin += r.duration_min || 0;
        s.distanceKm += r.distance_km || 0;
        s.charge += r.charge || 0;
        s.jours.push(r);
      }
      for (const [, s] of semaines) {
        s.jours.sort((a, b) => b.activity_date.localeCompare(a.activity_date));
      }

      const semainesTriees = [...semaines.entries()].sort((a, b) => b[0].localeCompare(a[0]));
      const MOIS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin",
                    "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

      // Regroupe par mois, dans l'ordre (le plus récent en premier)
      const parMois = new Map();
      semainesTriees.forEach(([key, s]) => {
        const dMois = new Date(key + "T00:00:00");
        const moisKey = `${dMois.getFullYear()}-${dMois.getMonth()}`;
        const moisLabel = `${MOIS[dMois.getMonth()]} ${dMois.getFullYear()}`;
        if (!parMois.has(moisKey)) parMois.set(moisKey, { label: moisLabel, semaines: [] });
        parMois.get(moisKey).semaines.push([key, s]);
      });

      panel.innerHTML = "";
      let premierMois = true;
      let idxGlobal = 0;

      for (const [moisKey, mois] of parMois) {
        const moisId = `mois-${moisKey}`;
        const toggle = document.createElement("div");
        toggle.className = "month-toggle";
        toggle.innerHTML = `<span class="month-label">${mois.label}</span><span class="month-line"></span><span class="month-chev${premierMois ? " open" : ""}">&#9656;</span>`;
        toggle.addEventListener("click", () => toggleMois(moisId, toggle));
        panel.appendChild(toggle);

        const weeksWrap = document.createElement("div");
        weeksWrap.className = "month-weeks" + (premierMois ? " open" : "");
        weeksWrap.id = moisId;

        mois.semaines.forEach(([key, s]) => {
          const idx = idxGlobal++;
          const card = document.createElement("div");
          card.className = "week-card";

          const head = document.createElement("div");
          head.className = "week-head";
          head.innerHTML = `<span class="label">${s.label}</span><span class="chev" id="chev-${idx}">&#9656;</span>`;
          head.addEventListener("click", () => toggleSemaine(idx));
          card.appendChild(head);

          const stats = document.createElement("div");
          stats.className = "week-stats";
          stats.innerHTML = `
            <div><div class="stat-label">Charge</div><div class="stat-value accent">${s.charge}</div></div>
            <div><div class="stat-label">Durée</div><div class="stat-value">${dureeLabel(s.dureeMin)}</div></div>
            <div><div class="stat-label">Distance</div><div class="stat-value">${s.distanceKm.toFixed(0)} km</div></div>
            <div><div class="stat-label">Sorties</div><div class="stat-value">${s.sorties}</div></div>
          `;
          card.appendChild(stats);

          const wrap = document.createElement("div");
          wrap.className = "detail-wrap";
          wrap.id = `detail-${idx}`;

          for (const j of s.jours) {
            const dayCard = document.createElement("div");
            dayCard.className = "day-card";
            dayCard.innerHTML = `
              <div class="day-head">
                <span class="day-title">${jourLabel(j.activity_date)}</span>
                <span class="day-type">${j.type || "Sortie"}</span>
              </div>
              <div class="metric-row">
                <div><div class="metric-label">Durée</div>${fmt(dureeLabel(j.duration_min || 0), "")}</div>
                <div><div class="metric-label">Distance</div>${fmt((j.distance_km || 0).toFixed(1), " km")}</div>
                <div><div class="metric-label">Puiss. moy</div>${fmt(j.avg_power, " W")}</div>
                <div><div class="metric-label">FC moy</div>${fmt(j.avg_hr, " bpm")}</div>
              </div>
              <div class="metric-row row2">
                <div><div class="metric-label">Puiss. max</div>${fmt(j.max_power, " W")}</div>
                <div><div class="metric-label">FC max</div>${fmt(j.max_hr, " bpm")}</div>
                <div><div class="metric-label">Charge</div>${fmt(j.charge, "")}</div>
              </div>
            `;
            wrap.appendChild(dayCard);
          }
          card.appendChild(wrap);
          weeksWrap.appendChild(card);
        });

        panel.appendChild(weeksWrap);
        premierMois = false;
      }
    }

    // Un seul mois ouvert à la fois : en ouvrir un ferme celui déjà ouvert.
    function toggleMois(moisId, toggleEl) {
      const wrap = document.getElementById(moisId);
      const wasOpen = wrap.classList.contains("open");
      document.querySelectorAll(".month-weeks.open").forEach(w => w.classList.remove("open"));
      document.querySelectorAll(".month-chev.open").forEach(c => c.classList.remove("open"));
      if (!wasOpen) {
        wrap.classList.add("open");
        toggleEl.querySelector(".month-chev").classList.add("open");
      }
    }

    // Une seule semaine ouverte à la fois (tous mois confondus) : changer de semaine
    // referme celle qui était ouverte.
    function toggleSemaine(idx) {
      if (semaineOuverteIdx !== null && semaineOuverteIdx !== idx) {
        document.getElementById(`detail-${semaineOuverteIdx}`)?.classList.remove("open");
        document.getElementById(`chev-${semaineOuverteIdx}`)?.classList.remove("open");
      }
      const wrap = document.getElementById(`detail-${idx}`);
      const chev = document.getElementById(`chev-${idx}`);
      const open = wrap.classList.toggle("open");
      chev.classList.toggle("open", open);
      semaineOuverteIdx = open ? idx : null;
    }

    async function rpc(name, token, payload = {}) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
          method: "POST",
          headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ p_token: token, ...payload })
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (e) { return null; }
    }

    async function charger() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const subtitle = document.getElementById("subtitle");

      if (!token) {
        subtitle.innerHTML = '<span class="error">Lien invalide : jeton manquant.</span>';
        return;
      }

      setupTabs();

      const [summaryRows, metricsRows, zonesRows, profileRows, riderProfileRows, messagesRows] = await Promise.all([
        rpc("get_coach_summary", token),
        rpc("get_coach_metrics", token),
        rpc("get_coach_zones", token),
        rpc("get_coach_profile", token),
        rpc("get_coach_rider_profile", token),
        rpc("get_coach_messages", token)
      ]);

      if (summaryRows === null && metricsRows === null && zonesRows === null) {
        subtitle.textContent = "";
        document.getElementById("panel-apercu").innerHTML = '<div class="error">Impossible de charger les données. Réessaie plus tard.</div>';
        return;
      }

      ensureApercuColumns();
      renderApercu(metricsRows || []);
      renderProfilCoureur((riderProfileRows && riderProfileRows[0]) || null);
      renderOverviewSummary(summaryRows || [], metricsRows || [], messagesRows || [], token);
      renderPlanning(summaryRows || []);
      renderZones((zonesRows && zonesRows[0]) || null);
      renderSante(metricsRows || []);

      const nom = profileRows && profileRows[0] && profileRows[0].athlete_name;
      document.querySelector(".brand").textContent = nom ? `ATHIA — ${nom}` : "ATHIA";
      subtitle.textContent = `${(summaryRows || []).length} sortie(s) sur les 12 derniers mois`;
    }

    charger();
  </script>
</body>
</html>
