<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suivi coureur</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f1115; color:#e6edf3; margin:0; padding:20px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color:#8b949e; font-size: 13px; margin-bottom: 20px; }
  table { width:100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #21262d; font-size: 14px; }
  th { color:#8b949e; font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty, .error { color:#8b949e; padding: 40px 0; text-align:center; }
  .error { color:#ff6b6b; }
  .week-row { cursor: pointer; }
  .week-row:hover { background: #161b22; }
  .chev { display:inline-block; width:14px; color:#8b949e; }
  .detail-row td { padding: 0; border-bottom: 1px solid #21262d; }
  .detail-wrap { display:none; padding: 4px 8px 14px 26px; }
  .detail-wrap.open { display:block; }
  .day-table { width:100%; border-collapse: collapse; }
  .day-table th { font-size: 10px; padding: 6px 6px; border-bottom: 1px solid #21262d; }
  .day-table td { font-size: 13px; padding: 6px 6px; border-bottom: none; color:#c9d1d9; }
  .day-table tr:nth-child(odd) td { background: #14181f; }
  .muted { color:#5f5e5a; }
  .foot { font-size: 12px; color:#5f5e5a; margin-top: 20px; border-top: 1px solid #21262d; padding-top: 12px; }
</style>
</head>
<body>
  <h1>Suivi de charge d'entra&icirc;nement</h1>
  <div class="sub" id="subtitle">Chargement...</div>
  <table id="table" style="display:none">
    <thead>
      <tr><th></th><th>Semaine</th><th class="num">Sorties</th><th class="num">Dur&eacute;e</th><th class="num">Distance</th><th class="num">Charge</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="foot">Cliquez sur une semaine pour voir le d&eacute;tail par jour.</div>

  <script>
    const SUPABASE_URL = "https://zhemtpvyhkbmjmydocux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mkVgshuPAO07VYIgv6dKtw_UdoLJGro";

    function isoWeekLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const day = (d.getDay() + 6) % 7; // lundi = 0
      const monday = new Date(d);
      monday.setDate(d.getDate() - day);
      const dd = String(monday.getDate()).padStart(2, "0");
      const mm = String(monday.getMonth() + 1).padStart(2, "0");
      return { key: monday.toISOString().slice(0, 10), label: `Semaine du ${dd}/${mm}` };
    }

    function jourLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const jours = ["dim", "lun", "mar", "mer", "jeu", "ven", "sam"];
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${jours[d.getDay()]} ${dd}/${mm}`;
    }

    function fmt(v, unit) {
      return (v === null || v === undefined) ? '<span class="muted">-</span>' : `${v}${unit}`;
    }

    async function charger() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const subtitle = document.getElementById("subtitle");

      if (!token) {
        subtitle.textContent = "";
        subtitle.innerHTML = '<span class="error">Lien invalide : jeton manquant.</span>';
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_coach_summary`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ p_token: token })
        });

        if (!res.ok) throw new Error("Requete refusee");
        const rows = await res.json();

        if (!rows || rows.length === 0) {
          subtitle.innerHTML = '<span class="empty">Lien valide, mais aucune sortie enregistr&eacute;e pour le moment.</span>';
          return;
        }

        const semaines = new Map();
        for (const r of rows) {
          const w = isoWeekLabel(r.activity_date);
          if (!semaines.has(w.key)) {
            semaines.set(w.key, { label: w.label, sorties: 0, dureeMin: 0, distanceKm: 0, charge: 0, jours: [] });
          }
          const s = semaines.get(w.key);
          s.sorties += 1;
          s.dureeMin += r.duration_min || 0;
          s.distanceKm += r.distance_km || 0;
          s.charge += r.charge || 0;
          s.jours.push(r);
        }
        for (const [, s] of semaines) {
          s.jours.sort((a, b) => b.activity_date.localeCompare(a.activity_date));
        }

        const semainesTriees = [...semaines.entries()].sort((a, b) => b[0].localeCompare(a[0]));

        const tbody = document.getElementById("tbody");
        semainesTriees.forEach(([key, s], idx) => {
          const heures = Math.floor(s.dureeMin / 60);
          const minutes = s.dureeMin % 60;

          const tr = document.createElement("tr");
          tr.className = "week-row";
          tr.innerHTML = `
            <td><span class="chev" id="chev-${idx}">&#9656;</span></td>
            <td>${s.label}</td>
            <td class="num">${s.sorties}</td>
            <td class="num">${heures}h${String(minutes).padStart(2, "0")}</td>
            <td class="num">${s.distanceKm.toFixed(0)} km</td>
            <td class="num">${s.charge}</td>
          `;
          tr.addEventListener("click", () => toggle(idx));
          tbody.appendChild(tr);

          const trDetail = document.createElement("tr");
          trDetail.className = "detail-row";
          const td = document.createElement("td");
          td.colSpan = 6;
          const wrap = document.createElement("div");
          wrap.className = "detail-wrap";
          wrap.id = `detail-${idx}`;

          const dayTable = document.createElement("table");
          dayTable.className = "day-table";
          dayTable.innerHTML = `
            <thead>
              <tr>
                <th>Jour</th><th>Type</th>
                <th class="num">Dur&eacute;e</th><th class="num">Distance</th><th class="num">Charge</th>
                <th class="num">Puiss. moy</th><th class="num">Puiss. max</th>
                <th class="num">FC moy</th><th class="num">FC max</th>
              </tr>
            </thead>
            <tbody></tbody>
          `;
          const dayBody = dayTable.querySelector("tbody");
          for (const j of s.jours) {
            const jh = Math.floor((j.duration_min || 0) / 60);
            const jm = (j.duration_min || 0) % 60;
            const jr = document.createElement("tr");
            jr.innerHTML = `
              <td>${jourLabel(j.activity_date)}</td>
              <td>${j.type || '-'}</td>
              <td class="num">${jh}h${String(jm).padStart(2, "0")}</td>
              <td class="num">${(j.distance_km || 0).toFixed(1)} km</td>
              <td class="num">${j.charge || 0}</td>
              <td class="num">${fmt(j.avg_power, ' W')}</td>
              <td class="num">${fmt(j.max_power, ' W')}</td>
              <td class="num">${fmt(j.avg_hr, ' bpm')}</td>
              <td class="num">${fmt(j.max_hr, ' bpm')}</td>
            `;
            dayBody.appendChild(jr);
          }
          wrap.appendChild(dayTable);
          td.appendChild(wrap);
          trDetail.appendChild(td);
          tbody.appendChild(trDetail);
        });

        subtitle.textContent = `${rows.length} sortie(s) sur les 12 derniers mois`;
        document.getElementById("table").style.display = "table";
      } catch (e) {
        subtitle.innerHTML = '<span class="error">Impossible de charger les donn&eacute;es. R&eacute;essaie plus tard.</span>';
      }
    }

    function toggle(idx) {
      const wrap = document.getElementById(`detail-${idx}`);
      const chev = document.getElementById(`chev-${idx}`);
      const open = wrap.classList.toggle("open");
      chev.innerHTML = open ? "&#9662;" : "&#9656;";
    }

    charger();
  </script>
</body>
</html>
