    }

    // Courbe principale avec une échelle CTL/ATL à gauche et une échelle TSB à droite.
    // Cela évite d'écraser visuellement le TSB, dont les valeurs sont négatives et plus petites.
    function drawFitnessChart(rows) {
      const canvas = document.getElementById("chart-forme");
      const detailEl = document.getElementById("chart-forme-detail");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      if (!rows || rows.length < 2) {
        if (detailEl) detailEl.textContent = "Pas encore assez de jours pour tracer une courbe.";
        return;
      }

      const leftValues = rows.flatMap(r => [r.ctl, r.atl]).filter(v => v != null).map(Number);
      const tsbValues = rows.map(r => r.tsb).filter(v => v != null).map(Number);
      const leftMax = Math.max(20, Math.ceil(Math.max(...leftValues, 10) / 20) * 20);
      const rightExtent = Math.max(10, Math.ceil(Math.max(...tsbValues.map(Math.abs), 10) / 10) * 10);
      const pad = { left: 42, right: 42, top: 10, bottom: 28 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;
      const x = i => pad.left + (i / (rows.length - 1)) * plotW;
      const yLeft = v => pad.top + (1 - Number(v) / leftMax) * plotH;
      const yRight = v => pad.top + (1 - (Number(v) + rightExtent) / (rightExtent * 2)) * plotH;
      let markerIndex = null;

      const drawSeries = (key, color, mapper) => {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.2;
        let started = false;
        rows.forEach((r, i) => {
          if (r[key] == null) return;
          const px = x(i), py = mapper(r[key]);
          if (!started) { ctx.moveTo(px, py); started = true; }
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
      };

      const draw = () => {
        ctx.clearRect(0, 0, w, h);
        ctx.font = "10px -apple-system, Segoe UI, sans-serif";
        ctx.textBaseline = "middle";

        for (let i = 0; i <= 4; i++) {
          const py = pad.top + i / 4 * plotH;
          ctx.strokeStyle = i === 2 ? "#D6DDD9" : "#E9ECEA";
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(w - pad.right, py); ctx.stroke();
          ctx.fillStyle = "#185FA5";
          ctx.textAlign = "right";
          ctx.fillText(String(Math.round(leftMax * (1 - i / 4))), pad.left - 7, py);
          ctx.fillStyle = "#0F6E56";
          ctx.textAlign = "left";
          ctx.fillText(String(Math.round(rightExtent - i / 4 * rightExtent * 2)), w - pad.right + 7, py);
        }

        const tickCount = Math.min(6, rows.length);
        for (let i = 0; i < tickCount; i++) {
          const idx = Math.round(i / Math.max(1, tickCount - 1) * (rows.length - 1));
          const d = new Date(rows[idx].date + "T00:00:00");
          const label = `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}`;
          ctx.fillStyle = "#7A7F7D"; ctx.textAlign = "center"; ctx.textBaseline = "top";
          ctx.fillText(label, x(idx), h - pad.bottom + 8);
        }

        drawSeries("ctl", "#185FA5", yLeft);
        drawSeries("atl", "#D9820B", yLeft);
        drawSeries("tsb", "#0F6E56", yRight);

        if (markerIndex != null) {
          const px = x(markerIndex);
          ctx.strokeStyle = "#7A7F7D"; ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, h - pad.bottom); ctx.stroke();
          ctx.setLineDash([]);
        }
      };

      const handlePointer = clientX => {
        const rect = canvas.getBoundingClientRect();
        const relX = (clientX - rect.left) / rect.width * w;
        markerIndex = Math.max(0, Math.min(rows.length - 1,
          Math.round((relX - pad.left) / plotW * (rows.length - 1))));
        draw();
        const r = rows[markerIndex];
        if (detailEl) detailEl.innerHTML = `<b>${jourLabel(r.date)}</b> — CTL ${r.ctl != null ? Math.round(r.ctl) : "--"} · ATL ${r.atl != null ? Math.round(r.atl) : "--"} · TSB ${r.tsb != null ? (r.tsb >= 0 ? "+" : "") + Math.round(r.tsb) : "--"}`;
      };

      draw();
      canvas.addEventListener("mousemove", e => handlePointer(e.clientX));
      canvas.addEventListener("click", e => handlePointer(e.clientX));
      canvas.addEventListener("touchstart", e => handlePointer(e.touches[0].clientX), { passive: true });
      canvas.addEventListener("touchmove", e => { handlePointer(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    }

    // Trace 1..N courbes sur un canvas, avec detection du point le plus proche au
    // clic/tap pour afficher le detail du jour sous le graphe.
    function drawLineChart({ canvasId, detailId, rows, series, formatDetail }) {
      const canvas = document.getElementById(canvasId);
      const detailEl = document.getElementById(detailId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (rows.length < 2) {
        if (detailEl) detailEl.textContent = "Pas encore assez de jours pour tracer une courbe.";
        return;
      }

      const allValues = rows.flatMap(r => series.map(s => r[s.key] || 0));
      const minV = Math.min(...allValues, 0);
      const maxV = Math.max(...allValues, 10);
      const pad = 10;
      const x = i => pad + (i / (rows.length - 1)) * (w - pad * 2);
      const y = v => h - pad - ((v - minV) / (maxV - minV || 1)) * (h - pad * 2);

      series.forEach(s => {
        ctx.beginPath();
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        rows.forEach((r, i) => {
          const v = r[s.key];
          if (v === null || v === undefined) return;
          const px = x(i), py = y(v);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();
      });

      let markerX = null;
      const drawMarker = () => {
        ctx.clearRect(0, 0, w, h);
        series.forEach(s => {
          ctx.beginPath();
          ctx.strokeStyle = s.color;
          ctx.lineWidth = 2;
          rows.forEach((r, i) => {
            const v = r[s.key];
            if (v === null || v === undefined) return;
            const px = x(i), py = y(v);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          });
          ctx.stroke();
        });
        if (markerX !== null) {
          ctx.strokeStyle = "#8a8a8a";
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(markerX, pad);
          ctx.lineTo(markerX, h - pad);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      };

      const handlePointer = (clientX) => {
        const rect = canvas.getBoundingClientRect();
        const relX = (clientX - rect.left) / rect.width * w;
        const idx = Math.round((relX - pad) / (w - pad * 2) * (rows.length - 1));
        const clamped = Math.max(0, Math.min(rows.length - 1, idx));
        markerX = x(clamped);
        drawMarker();
        if (detailEl) detailEl.innerHTML = formatDetail(rows[clamped]);
      };

      canvas.addEventListener("mousemove", (e) => handlePointer(e.clientX));
      canvas.addEventListener("click", (e) => handlePointer(e.clientX));
      canvas.addEventListener("touchstart", (e) => { handlePointer(e.touches[0].clientX); }, { passive: true });
      canvas.addEventListener("touchmove", (e) => { handlePointer(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    }

    // Période affichée dans l'onglet Zones : "total" (cumul depuis le début) ou une moyenne
    // par semaine/mois/année. Un seul sélecteur pour les deux cartes (puissance + FC).
    let zonesPeriode = "total";
    let zonesRowCache = null;

    const ZONES_PERIODES = [
      { id: "total", label: "Total" },
      { id: "semaine", label: "Semaine" },
      { id: "mois", label: "Mois" },
      { id: "annee", label: "Année" }
    ];

    function zoneValeur(z, periode) {
      switch (periode) {
        case "semaine": return z.avgMinPerWeek;
        case "mois": return z.avgMinPerMonth;
        case "annee": return z.avgMinPerYear;
        default: return z.minutes;
      }
    }

    function renderZones(zonesRow) {
      zonesRowCache = zonesRow;
      const panel = document.getElementById("panel-zones");
      if (!zonesRow || (!zonesRow.power_zones?.length && !zonesRow.hr_zones?.length)) {
        panel.innerHTML = '<div class="empty">Pas encore de répartition par zones partagée.</div>';
        return;
      }

      const tabsHtml = `
        <div class="tabs" style="padding:0;margin:0 0 14px;background:transparent">
          ${ZONES_PERIODES.map(p => `<button class="tab zones-periode-tab${p.id === zonesPeriode ? " active" : ""}" data-periode="${p.id}" style="color:${p.id === zonesPeriode ? "var(--teal)" : "var(--text-muted)"};background:${p.id === zonesPeriode ? "var(--teal-light-bg)" : "var(--border-light)"}">${p.label}</button>`).join("")}
        </div>`;

      const renderZoneCard = (title, zones) => {
        if (!zones || zones.length === 0) return "";
        const values = zones.map(z => zoneValeur(z, zonesPeriode) || 0);
        const maxV = Math.max(...values, 1);
        const rows = zones.map((z, i) => `
          <div class="zone-row">
            <div class="zone-label">${z.label}</div>
            <div style="flex:1">
              <div class="zone-bar-wrap"><div class="zone-bar" style="width:${(values[i] / maxV * 100).toFixed(0)}%"></div></div>
            </div>
            <div class="zone-value">${dureeLabel(Math.round(values[i]))}</div>
          </div>`).join("");
        return `<div class="card"><h3>${title}</h3>${rows}</div>`;
      };

      panel.innerHTML = tabsHtml +
        renderZoneCard("Zones de puissance", zonesRow.power_zones) +
        renderZoneCard("Zones de fréquence cardiaque", zonesRow.hr_zones);

      panel.querySelectorAll(".zones-periode-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          zonesPeriode = btn.dataset.periode;
          renderZones(zonesRowCache);
        });
      });
    }

    let zonesPeriodeV2 = "28";
    let zonesComparaisonV2 = "precedente";
    let zonesDateDebutV2 = "";
    let zonesDateFinV2 = "";
    let zonesRowCacheV2 = null;

    const ZONES_PERIODES_V2 = [
      { id: "7", label: "7 jours" },
      { id: "28", label: "28 jours" },
      { id: "90", label: "90 jours" },
      { id: "saison", label: "Saison" },
      { id: "dates", label: "Dates" }
    ];
    const ZONE_LABELS_V2 = ["Récupération", "Endurance", "Tempo", "Seuil", "VO2max", "Anaérobie"];
    const ZONE_COLORS_V2 = ["var(--zone-1)", "var(--zone-2)", "var(--zone-3)", "var(--zone-4)", "var(--zone-5)", "var(--zone-6)"];

    function zoneDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseZoneDate(key) {
      const parts = String(key || "").split("-").map(Number);
      return parts.length === 3 && parts.every(Number.isFinite)
        ? new Date(parts[0], parts[1] - 1, parts[2], 12)
        : null;
    }

    function addZoneDays(date, count) {
      const result = new Date(date);
      result.setDate(result.getDate() + count);
      return result;
    }

    function zoneRangeLabel(range) {
      const options = { day: "numeric", month: "short", year: "numeric" };
      return `${range.start.toLocaleDateString("fr-FR", options)} — ${range.end.toLocaleDateString("fr-FR", options)}`;
    }

    function activeZoneRange() {
      const today = new Date();
      const end = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12);
      if (zonesPeriodeV2 === "dates") {
        const customStart = parseZoneDate(zonesDateDebutV2);
        const customEnd = parseZoneDate(zonesDateFinV2);
        if (customStart && customEnd && customStart <= customEnd) return { start: customStart, end: customEnd };
      }
      const start = zonesPeriodeV2 === "7" ? addZoneDays(end, -6)
        : zonesPeriodeV2 === "90" ? addZoneDays(end, -89)
        : zonesPeriodeV2 === "saison" ? new Date(end.getFullYear(), 0, 1, 12)
        : addZoneDays(end, -27);
      return { start, end };
    }

    function comparedZoneRange(range) {
      if (zonesComparaisonV2 === "aucune") return null;
      if (zonesComparaisonV2 === "annee") {
        const start = new Date(range.start);
        const end = new Date(range.end);
        start.setFullYear(start.getFullYear() - 1);
        end.setFullYear(end.getFullYear() - 1);
        return { start, end };
      }
      const length = Math.round((range.end - range.start) / 86400000) + 1;
      const end = addZoneDays(range.start, -1);
      return { start: addZoneDays(end, -(length - 1)), end };
    }

    function normalizeZonePayloadV2(raw) {
      if (Array.isArray(raw)) return { zones: raw, days: [], legacy: true };
      if (raw && Array.isArray(raw.zones)) {
        return {
          zones: raw.zones,
          days: Array.isArray(raw.days) ? raw.days : [],
          legacy: Number(raw.version || 0) < 2
        };
      }
      return { zones: [], days: [], legacy: false };
    }

    function aggregateZonePayloadV2(payload, range) {
      if (payload.legacy || payload.days.length === 0) {
        return payload.zones.map(zone => ({
          ...zone,
          minutes: Number(zone.minutes || 0),
          estimatedMinutes: Number(zone.estimatedMinutes || 0)
        }));
      }
      const values = payload.zones.map(() => 0);
      const estimatedValues = payload.zones.map(() => 0);
      const startKey = zoneDateKey(range.start);
      const endKey = zoneDateKey(range.end);
      payload.days.forEach(day => {
        if (!day || !day.date || day.date < startKey || day.date > endKey || !Array.isArray(day.minutes)) return;
        day.minutes.forEach((minutes, index) => {
          if (index < values.length) values[index] += Number(minutes || 0);
        });
        if (Array.isArray(day.estimatedMinutes)) {
          day.estimatedMinutes.forEach((minutes, index) => {
            if (index < estimatedValues.length) estimatedValues[index] += Number(minutes || 0);
          });
        }
      });
      return payload.zones.map((zone, index) => ({
        ...zone,
        minutes: values[index] || 0,
        estimatedMinutes: estimatedValues[index] || 0
      }));
    }

    function zoneDurationLabel(minutes) {
      const rounded = Math.max(0, Math.round(Number(minutes || 0)));
      const hours = Math.floor(rounded / 60);
      const mins = rounded % 60;
      return hours > 0
        ? `${hours.toLocaleString("fr-FR")} h ${String(mins).padStart(2, "0")}`
        : `${mins} min`;
    }

    function zoneDonutGradient(percentages) {
      if (!percentages.some(value => value > 0)) return "var(--border-light)";
      let cursor = 0;
      return `conic-gradient(${percentages.map((value, index) => {
        const start = cursor;
        cursor += value;
        return `${ZONE_COLORS_V2[index]} ${start.toFixed(2)}% ${cursor.toFixed(2)}%`;
      }).join(",")})`;
    }

    function renderZoneCardV2(title, icon, payload, kind, range, compareRange) {
      if (!payload.zones.length) return "";
      const zones = aggregateZonePayloadV2(payload, range);
      const compareZones = compareRange && !payload.legacy ? aggregateZonePayloadV2(payload, compareRange) : [];
      const values = zones.map(zone => Number(zone.minutes || 0));
      const total = values.reduce((sum, value) => sum + value, 0);
      const estimatedTotal = zones.reduce((sum, zone) => sum + Number(zone.estimatedMinutes || 0), 0);
      const percentages = values.map(value => total > 0 ? value / total * 100 : 0);
      const pair = kind === "power" ? [0, 1] : [1, 2];
      const pairPercent = Math.round((percentages[pair[0]] || 0) + (percentages[pair[1]] || 0));
      const pairLabel = kind === "power" ? "Z1 + Z2" : "Z2 + Z3";
      const insight = kind === "power" ? "Base aérobie dominante" : "Endurance et tempo dominants";
      const compareTotal = compareZones.reduce((sum, zone) => sum + Number(zone.minutes || 0), 0);
      const delta = compareTotal > 0 ? Math.round((total - compareTotal) / compareTotal * 100) : null;
      const totalContext = delta === null ? "temps sur la période" : `${delta >= 0 ? "+" : ""}${delta} % vs comparaison`;
      const maxValue = Math.max(...values, 1);
      const allocation = percentages.map((pct, index) =>
        `<span class="zone-color-${index + 1}" style="width:${pct.toFixed(2)}%"></span>`
      ).join("");
      const rows = zones.map((zone, index) => {
        const width = values[index] > 0 ? Math.max(1, values[index] / maxValue * 100) : 0;
        return `<div class="zone-detail-row">
          <div class="zone-detail-label"><span class="zone-dot zone-color-${index + 1}"></span><span>${ZONE_LABELS_V2[index] || escapeHtml(zone.label || `Z${index + 1}`)}</span></div>
          <div class="zone-mini-track"><div class="zone-mini-fill zone-color-${index + 1}" style="width:${width.toFixed(1)}%"></div></div>
          <div class="zone-detail-value">${zoneDurationLabel(values[index])}</div>
        </div>`;
      }).join("");

      return `<section class="card zone-card">
        <div class="zone-card-head">
          <div class="zone-card-title"><span class="zone-card-icon">${icon}</span>${title}</div>
          <div class="zone-total">${zoneDurationLabel(total)}
            <small>${totalContext}</small>
            ${estimatedTotal > 0
              ? `<small class="zone-estimated">${zoneDurationLabel(estimatedTotal)} estimées faute de courbe</small>`
              : "<small>courbes mesurées</small>"}
          </div>
        </div>
        <div class="zone-overview">
          <div class="zone-donut" style="background:${zoneDonutGradient(percentages)}">
            <div class="zone-donut-center"><div class="zone-donut-value">${pairPercent} %</div><div class="zone-donut-label">${pairLabel}</div></div>
          </div>
          <div>
            <div class="zone-insight">${insight}</div>
            <div class="zone-allocation">${allocation}</div>
            <div class="zone-insight-sub">La durée et la part de chaque zone restent visibles sur chaque ligne.</div>
          </div>
        </div>
        ${rows}
      </section>`;
    }

    function renderZonesV2(zonesRow) {
      zonesRowCacheV2 = zonesRow;
      const panel = document.getElementById("panel-zones");
      if (!zonesRow || (!zonesRow.power_zones && !zonesRow.hr_zones)) {
        panel.innerHTML = '<div class="empty">Pas encore de répartition par zones partagée.</div>';
        return;
      }

      const powerPayload = normalizeZonePayloadV2(zonesRow.power_zones);
      const heartPayload = normalizeZonePayloadV2(zonesRow.hr_zones);
      if (!powerPayload.zones.length && !heartPayload.zones.length) {
        panel.innerHTML = '<div class="empty">Pas encore de répartition par zones partagée.</div>';
        return;
      }
      const availablePayloads = [powerPayload, heartPayload].filter(payload => payload.zones.length);
      const hasDailyData = availablePayloads.length > 0 && availablePayloads.every(payload => !payload.legacy && payload.days.length > 0);
      const range = activeZoneRange();
      const compareRange = comparedZoneRange(range);
      if (!zonesDateDebutV2) zonesDateDebutV2 = zoneDateKey(addZoneDays(range.end, -27));
      if (!zonesDateFinV2) zonesDateFinV2 = zoneDateKey(range.end);

      panel.innerHTML = `
        <div class="zones-toolbar">
          <div>
            <span class="zones-toolbar-label">Période analysée</span>
            <div class="zones-periods">
              ${ZONES_PERIODES_V2.map(period => `<button class="zones-period-btn${period.id === zonesPeriodeV2 ? " active" : ""}" data-periode="${period.id}"${hasDailyData ? "" : " disabled"}>${period.label}</button>`).join("")}
            </div>
          </div>
          <div>
            <label class="zones-toolbar-label" for="zones-compare-v2">Comparer avec</label>
            <select class="zones-compare-select" id="zones-compare-v2"${hasDailyData ? "" : " disabled"}>
              <option value="precedente"${zonesComparaisonV2 === "precedente" ? " selected" : ""}>La période précédente</option>
              <option value="annee"${zonesComparaisonV2 === "annee" ? " selected" : ""}>La même période l'an dernier</option>
              <option value="aucune"${zonesComparaisonV2 === "aucune" ? " selected" : ""}>Aucune comparaison</option>
            </select>
          </div>
          <div class="zones-date-fields${zonesPeriodeV2 === "dates" ? " visible" : ""}">
            <div class="zones-date-field"><label for="zones-date-start-v2">Du</label><input class="zones-date-input" id="zones-date-start-v2" type="date" value="${zonesDateDebutV2}"></div>
            <div class="zones-date-field"><label for="zones-date-end-v2">Au</label><input class="zones-date-input" id="zones-date-end-v2" type="date" value="${zonesDateFinV2}"></div>
          </div>
        </div>
        ${hasDailyData ? "" : '<div class="zone-legacy-note">Une synchronisation depuis la nouvelle version de l’application activera les périodes. Le cumul historique reste affiché.</div>'}
        <div class="zones-range"><span>Période affichée : <strong>${hasDailyData ? zoneRangeLabel(range) : "Historique total"}</strong></span><span>${hasDailyData && compareRange ? `Comparée au ${zoneRangeLabel(compareRange)}` : ""}</span></div>
        <div class="zones-grid">
          ${renderZoneCardV2("Puissance", "&#9889;", powerPayload, "power", range, hasDailyData ? compareRange : null)}
          ${renderZoneCardV2("Fréquence cardiaque", "&#9825;", heartPayload, "heart", range, hasDailyData ? compareRange : null)}
        </div>`;

      panel.querySelectorAll(".zones-period-btn").forEach(button => {
        button.addEventListener("click", () => {
          zonesPeriodeV2 = button.dataset.periode;
          renderZonesV2(zonesRowCacheV2);
        });
      });
      panel.querySelector("#zones-compare-v2")?.addEventListener("change", event => {
        zonesComparaisonV2 = event.target.value;
        renderZonesV2(zonesRowCacheV2);
      });
      panel.querySelector("#zones-date-start-v2")?.addEventListener("change", event => {
        zonesDateDebutV2 = event.target.value;
        renderZonesV2(zonesRowCacheV2);
      });
      panel.querySelector("#zones-date-end-v2")?.addEventListener("change", event => {
        zonesDateFinV2 = event.target.value;
        renderZonesV2(zonesRowCacheV2);
      });
    }

    let santePeriode = 28;
    let santeDetailsOuverts = false;
    let santeMetricsCache = [];

    function moyenneSante(rows, key) {
      const values = rows
        .map(row => row[key])
        .filter(value => value != null)
        .map(Number)
        .filter(Number.isFinite);
      return values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : null;
    }

    function formatSommeilCoach(value) {
      if (!Number.isFinite(value)) return "—";
      const heures = Math.floor(value);
      const minutes = Math.round((value - heures) * 60);
      return `${heures} h ${String(minutes).padStart(2, "0")}`;
    }

    function formatDateSante(value) {
      return new Date(value + "T12:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
    }

    function santeDernierIndex(rows, key) {
      for (let index = rows.length - 1; index >= 0; index -= 1) {
        if (rows[index][key] != null && Number.isFinite(Number(rows[index][key]))) return index;
      }
      return -1;
    }

    function cheminSante(rows, key, xFor, yFor) {
      let path = "";
      let enCours = false;
      rows.forEach((row, index) => {
        const value = Number(row[key]);
        if (row[key] == null || !Number.isFinite(value)) {
          enCours = false;
          return;
        }
        path += `${enCours ? " L" : " M"} ${xFor(index).toFixed(1)} ${yFor(value).toFixed(1)}`;
        enCours = true;
      });
      return path.trim();
    }

    function texteSvgSante(x, y, text, classe = "", anchor = "start") {
      return `<text x="${x}" y="${y}" class="${classe}" text-anchor="${anchor}">${text}</text>`;
    }

    function renderGraphiqueSante(rows, sleepReference, heartReference) {
      const svg = document.getElementById("health-trend-chart");
      const left = 60;
      const right = 940;
      const topSleep = 35;
      const bottomSleep = 125;
      const topHeart = 175;
      const bottomHeart = 265;
      const xFor = index => rows.length === 1 ? left : left + index / (rows.length - 1) * (right - left);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const sleepY = value => clamp(bottomSleep - (value - 5.5) / 4 * (bottomSleep - topSleep), topSleep, bottomSleep);
      const heartY = value => clamp(bottomHeart - (value - 38) / 14 * (bottomHeart - topHeart), topHeart, bottomHeart);
      const latestSleepIndex = santeDernierIndex(rows, "sleep_hours");
      const latestHeartIndex = santeDernierIndex(rows, "resting_hr");
      const latestSleep = latestSleepIndex >= 0 ? Number(rows[latestSleepIndex].sleep_hours) : null;
      const latestHeart = latestHeartIndex >= 0 ? Number(rows[latestHeartIndex].resting_hr) : null;
      const dateIndexes = [...new Set([0, Math.floor((rows.length - 1) / 2), rows.length - 1])];

      const sleepGrid = [6, 7.5, 9].map(value => `
        <line class="grid" x1="${left}" y1="${sleepY(value)}" x2="${right}" y2="${sleepY(value)}"></line>
        ${texteSvgSante(left - 9, sleepY(value) + 4, String(value).replace(".", ","), "", "end")}
      `).join("");
      const heartGrid = [40, 45, 50].map(value => `
        <line class="grid" x1="${left}" y1="${heartY(value)}" x2="${right}" y2="${heartY(value)}"></line>
        ${texteSvgSante(left - 9, heartY(value) + 4, value, "", "end")}
      `).join("");
      const sleepBand = sleepReference == null ? "" : `
        <rect class="band" x="${left}" y="${sleepY(sleepReference + .35)}" width="${right - left}" height="${Math.max(1, sleepY(sleepReference - .35) - sleepY(sleepReference + .35))}"></rect>
        <line class="reference" x1="${left}" y1="${sleepY(sleepReference)}" x2="${right}" y2="${sleepY(sleepReference)}"></line>`;
      const heartBand = heartReference == null ? "" : `
        <rect class="band" x="${left}" y="${heartY(heartReference + 2)}" width="${right - left}" height="${Math.max(1, heartY(heartReference - 2) - heartY(heartReference + 2))}"></rect>
        <line class="reference" x1="${left}" y1="${heartY(heartReference)}" x2="${right}" y2="${heartY(heartReference)}"></line>`;

      svg.innerHTML = `
        <title>Sommeil et fréquence cardiaque au repos</title>
        <desc>Deux courbes alignées sur ${rows.length} jours avec les références personnelles calculées sur 28 jours.</desc>
        ${sleepGrid}${heartGrid}${sleepBand}${heartBand}
        <path class="sleep-line" d="${cheminSante(rows, "sleep_hours", xFor, sleepY)}"></path>
        <path class="heart-line" d="${cheminSante(rows, "resting_hr", xFor, heartY)}"></path>
        ${latestSleep == null ? "" : `<circle class="sleep-point" cx="${xFor(latestSleepIndex)}" cy="${sleepY(latestSleep)}" r="5"></circle>`}
        ${latestHeart == null ? "" : `<circle class="heart-point" cx="${xFor(latestHeartIndex)}" cy="${heartY(latestHeart)}" r="5"></circle>`}
        ${texteSvgSante(left, 20, "Sommeil (h)", "axis-title")}
        ${texteSvgSante(left, 160, "FC repos (bpm)", "axis-title")}
        ${latestSleep == null ? "" : texteSvgSante(right, 20, `${formatSommeilCoach(latestSleep)} au dernier relevé`, "latest", "end")}
        ${latestHeart == null ? "" : texteSvgSante(right, 160, `${Math.round(latestHeart)} bpm au dernier relevé`, "latest", "end")}
        ${dateIndexes.map((index, position) => texteSvgSante(xFor(index), 294, formatDateSante(rows[index].date), "", position === 0 ? "start" : position === dateIndexes.length - 1 ? "end" : "middle")).join("")}
      `;
    }

    function updateSanteDetailsToggle(signalCount) {
      const button = document.getElementById("health-signals-toggle");
      const details = document.getElementById("health-signals-details");
      if (!button || !details) return;
      if (signalCount === 0) santeDetailsOuverts = false;
      button.disabled = signalCount === 0;
      button.setAttribute("aria-expanded", String(santeDetailsOuverts));
      button.textContent = signalCount === 0
        ? "Aucun jour à vérifier"
        : santeDetailsOuverts
          ? "Masquer les jours à vérifier"
          : `Voir ${signalCount} jour(s) à vérifier`;
      details.classList.toggle("open", santeDetailsOuverts);
    }

    function renderSante(metricsRows) {
      const panel = document.getElementById("panel-sante");
      santeMetricsCache = metricsRows || [];
      const avecSante = santeMetricsCache
        .filter(row => row.sleep_hours != null || row.resting_hr != null)
        .slice()
        .sort((a, b) => a.date.localeCompare(b.date));
      if (avecSante.length === 0) {
        panel.innerHTML = '<div class="empty">Pas encore de données de santé partagées.</div>';
        return;
      }

      const rows = avecSante.slice(-santePeriode);
      const referenceRows = avecSante.slice(-28);
      const lastSeven = rows.slice(-7);
      const sleepReference = moyenneSante(referenceRows, "sleep_hours");
      const heartReference = moyenneSante(referenceRows, "resting_hr");
      const sleepAverageSeven = moyenneSante(lastSeven, "sleep_hours");
      const heartAverageSeven = moyenneSante(lastSeven, "resting_hr");
      const latestSleepIndex = santeDernierIndex(rows, "sleep_hours");
      const latestHeartIndex = santeDernierIndex(rows, "resting_hr");
      const latestSleep = latestSleepIndex >= 0 ? Number(rows[latestSleepIndex].sleep_hours) : null;
      const latestHeart = latestHeartIndex >= 0 ? Number(rows[latestHeartIndex].resting_hr) : null;
      const completeDays = rows.filter(row => row.sleep_hours != null && row.resting_hr != null).length;
      const latestTsbRow = santeMetricsCache
        .filter(row => row.tsb != null)
        .slice()
        .sort((a, b) => a.date.localeCompare(b.date))
        .pop();
      const latestTsb = latestTsbRow ? Math.round(Number(latestTsbRow.tsb)) : null;
      const signals = rows.filter(row =>
        (sleepReference != null && row.sleep_hours != null && Number(row.sleep_hours) < sleepReference - .75) ||
        (heartReference != null && row.resting_hr != null && Number(row.resting_hr) > heartReference + 4)
      ).reverse().slice(0, 6);

      const signalRows = signals.map(row => {
        const readings = [];
        if (sleepReference != null && row.sleep_hours != null && Number(row.sleep_hours) < sleepReference - .75) {
          readings.push("Sommeil nettement sous la référence");
        }
        if (heartReference != null && row.resting_hr != null && Number(row.resting_hr) > heartReference + 4) {
          readings.push("FC repos inhabituellement élevée");
        }
        return `
          <tr>
            <td>${formatDateSante(row.date)}</td>
            <td class="numeric">${row.sleep_hours == null ? "—" : formatSommeilCoach(Number(row.sleep_hours))}</td>
            <td class="numeric">${row.resting_hr == null ? "—" : `${Math.round(Number(row.resting_hr))} bpm`}</td>
            <td class="health-signal-reading">${readings.join(" · ")}</td>
          </tr>`;
      }).join("");

      panel.innerHTML = `
        <div class="health-toolbar">
          <div class="health-periods">
            ${[7, 28, 90].map(days => `<button class="health-period${days === santePeriode ? " active" : ""}" type="button" data-days="${days}">${days} jours</button>`).join("")}
          </div>
          <span class="health-range">${formatDateSante(rows[0].date)} — ${formatDateSante(rows[rows.length - 1].date)}</span>
        </div>
        <div class="health-stat-grid">
          <div class="card health-stat">
            <div class="health-stat-label">Sommeil — dernier relevé</div>
            <div class="health-stat-value">${formatSommeilCoach(latestSleep)}</div>
            <div class="health-stat-context"><span>Moyenne 7 j : <strong>${formatSommeilCoach(sleepAverageSeven)}</strong></span><span>Référence 28 j : ${formatSommeilCoach(sleepReference)}</span></div>
          </div>
          <div class="card health-stat">
            <div class="health-stat-label">Fréquence cardiaque au repos</div>
            <div class="health-stat-value">${latestHeart == null ? "—" : `${Math.round(latestHeart)} bpm`}</div>
            <div class="health-stat-context"><span>Moyenne 7 j : <strong>${heartAverageSeven == null ? "—" : `${Math.round(heartAverageSeven)} bpm`}</strong></span><span>Référence 28 j : ${heartReference == null ? "—" : `${Math.round(heartReference)} bpm`}</span></div>
          </div>
        </div>
        <div class="card health-chart-card">
          <div class="health-chart-head">
            <div><div class="health-chart-title">Évolution et références personnelles</div><div class="health-chart-sub">${completeDays}/${rows.length} jours avec sommeil et FC repos</div></div>
            <span class="health-tsb-badge">Contexte entraînement : TSB ${latestTsb == null ? "—" : `${latestTsb > 0 ? "+" : ""}${latestTsb}`}</span>
          </div>
          <div class="health-chart-meta">
            <div class="health-legend">
              <span class="health-legend-item"><span class="health-legend-line"></span>Sommeil</span>
              <span class="health-legend-item"><span class="health-legend-line heart"></span>FC repos</span>
              <span class="health-legend-item"><span class="health-legend-band"></span>Référence personnelle</span>
            </div>
            <span>Les deux courbes utilisent les mêmes dates.</span>
          </div>
          <svg class="health-chart-svg" id="health-trend-chart" viewBox="0 0 1000 300" role="img" aria-label="Sommeil et fréquence cardiaque au repos"></svg>
        </div>
        <div class="health-signals">
          <div class="health-signals-head">
            <div><div class="health-signals-title">Jours à vérifier</div><div class="health-signals-sub">La liste reste fermée tant que le coach ne la demande pas.</div></div>
            <button class="health-signals-toggle" id="health-signals-toggle" type="button" aria-expanded="${santeDetailsOuverts}" aria-controls="health-signals-details"></button>
          </div>
          <div class="health-signals-details${santeDetailsOuverts ? " open" : ""}" id="health-signals-details">
            <div class="health-rule">Sommeil inférieur à la référence de 45 min ou FC repos supérieure de 4 bpm.</div>
            <table class="health-signal-table">
              <thead><tr><th>Date</th><th class="numeric">Sommeil</th><th class="numeric">FC repos</th><th>Lecture rapide</th></tr></thead>
              <tbody>${signalRows}</tbody>
            </table>
          </div>
        </div>`;

      renderGraphiqueSante(rows, sleepReference, heartReference);
      updateSanteDetailsToggle(signals.length);

      panel.querySelectorAll(".health-period").forEach(button => {
        button.addEventListener("click", () => {
          santePeriode = Number(button.dataset.days);
          renderSante(santeMetricsCache);
        });
      });
      panel.querySelector("#health-signals-toggle").addEventListener("click", () => {
        santeDetailsOuverts = !santeDetailsOuverts;
        updateSanteDetailsToggle(signals.length);
      });
    }

    let semaineOuverteIdx = null;


    let planningMonths = [];
    let planningMonthIndex = 0;

    function planningDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function planningWeekRange(weekKey) {
      const start = new Date(weekKey + "T12:00:00");
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const options = { day: "numeric", month: "short" };
      return `${start.toLocaleDateString("fr-FR", options)} – ${end.toLocaleDateString("fr-FR", options)}`;
    }

    function renderPlanning(rows) {
      const panel = document.getElementById("panel-planning");
      if (!rows || rows.length === 0) {
        panel.innerHTML = '<div class="empty">Lien valide, mais aucune sortie enregistrée pour le moment.</div>';
        return;
      }

      const semaines = new Map();
      for (const r of rows) {
        const w = isoWeekLabel(r.activity_date);
        if (!semaines.has(w.key)) {
          semaines.set(w.key, { label: w.label, sorties: 0, dureeMin: 0, distanceKm: 0, charge: 0, jours: [] });
        }
        const s = semaines.get(w.key);
        s.sorties += 1;
        s.dureeMin += Number(r.duration_min || 0);
        s.distanceKm += Number(r.distance_km || 0);
        s.charge += Number(r.charge || 0);
        s.jours.push(r);
      }
      for (const [, s] of semaines) {
        s.jours.sort((a, b) => a.activity_date.localeCompare(b.activity_date));
      }

      const semainesTriees = [...semaines.entries()].sort((a, b) => b[0].localeCompare(a[0]));
      const MOIS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin",
                    "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      const parMois = new Map();
      semainesTriees.forEach(([key, s]) => {
        const dMois = new Date(key + "T12:00:00");
        const moisKey = `${dMois.getFullYear()}-${dMois.getMonth()}`;
        if (!parMois.has(moisKey)) {
          parMois.set(moisKey, {
            key: moisKey,
            label: `${MOIS[dMois.getMonth()]} ${dMois.getFullYear()}`,
            semaines: []
          });
        }
        parMois.get(moisKey).semaines.push([key, s]);
      });

      planningMonths = [...parMois.values()];
      planningMonthIndex = 0;
      semaineOuverteIdx = null;
      renderPlanningMonth();
    }

    function renderPlanningMonth() {
      const panel = document.getElementById("panel-planning");
      const mois = planningMonths[planningMonthIndex];
      if (!mois) return;

      const total = mois.semaines.reduce((acc, [, s]) => {
        acc.charge += s.charge;
        acc.dureeMin += s.dureeMin;
        acc.distanceKm += s.distanceKm;
        acc.sorties += s.sorties;
        return acc;
      }, { charge: 0, dureeMin: 0, distanceKm: 0, sorties: 0 });
      const maxCharge = Math.max(...mois.semaines.map(([, s]) => s.charge), 1);
      const todayKey = planningDateKey(new Date());

      const rowsHtml = mois.semaines.map(([key, s], idx) => {
        const isOpen = semaineOuverteIdx === idx;
        return `
          <tr class="week-row${isOpen ? " open" : ""}" data-week-index="${idx}">
            <td>
              <span class="planning-week-label">${s.label}</span>
              <span class="planning-week-range">${planningWeekRange(key)}</span>
            </td>
            <td class="planning-load">
              <div class="planning-load-value"><strong>${s.charge}</strong><span class="planning-stat-note">pts</span></div>
              <div class="planning-load-track"><div class="planning-load-fill" style="width:${Math.max(1, s.charge / maxCharge * 100).toFixed(1)}%"></div></div>
            </td>
            <td class="numeric">${dureeLabel(s.dureeMin)}</td>
            <td class="numeric">${s.distanceKm.toFixed(0)} km</td>
            <td class="numeric">${s.sorties}</td>
            <td class="numeric"><button class="planning-week-toggle" type="button" aria-expanded="${isOpen}" aria-label="${isOpen ? "Fermer" : "Afficher"} les séances de ${s.label}">${isOpen ? "&#9652;" : "&#9662;"}</button></td>
          </tr>`;
      }).join("");

      const detailHtml = semaineOuverteIdx === null
        ? ""
        : renderPlanningWeekDetail(mois.semaines[semaineOuverteIdx], todayKey);

      panel.innerHTML = `
        <div class="planning-toolbar">
          <div class="planning-month-nav">
            <button class="planning-month-button" id="planning-older-month" type="button" aria-label="Mois précédent" ${planningMonthIndex >= planningMonths.length - 1 ? "disabled" : ""}>&#8249;</button>
            <select class="planning-month-select" id="planning-month-select" aria-label="Mois affiché">
              ${planningMonths.map((item, idx) => `<option value="${idx}"${idx === planningMonthIndex ? " selected" : ""}>${item.label}</option>`).join("")}
            </select>
            <button class="planning-month-button" id="planning-newer-month" type="button" aria-label="Mois suivant" ${planningMonthIndex === 0 ? "disabled" : ""}>&#8250;</button>
          </div>
          <span class="planning-month-context">${mois.semaines.length} semaine(s) · ${total.sorties} sortie(s)</span>
        </div>
        <div class="planning-month-stats">
          <div class="planning-stat"><div class="planning-stat-label">Charge totale</div><div class="planning-stat-value">${total.charge.toFixed(0)} <span class="planning-stat-note">pts</span></div></div>
          <div class="planning-stat"><div class="planning-stat-label">Temps réalisé</div><div class="planning-stat-value">${dureeLabel(total.dureeMin)} <span class="planning-stat-note">sur le mois</span></div></div>
          <div class="planning-stat"><div class="planning-stat-label">Distance</div><div class="planning-stat-value">${total.distanceKm.toFixed(0)} km <span class="planning-stat-note">${total.sorties} sortie(s)</span></div></div>
        </div>
        <div class="planning-table-wrap">
          <table class="planning-table">
            <thead><tr><th>Semaine</th><th>Charge</th><th class="numeric">Durée</th><th class="numeric">Distance</th><th class="numeric">Sorties</th><th></th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        ${detailHtml}`;

      panel.querySelectorAll(".week-row").forEach(row => {
        row.addEventListener("click", () => toggleSemaine(Number(row.dataset.weekIndex)));
      });
      panel.querySelector("#planning-month-select").addEventListener("change", event => {
        planningMonthIndex = Number(event.target.value);
        semaineOuverteIdx = null;
        renderPlanningMonth();
      });
      panel.querySelector("#planning-older-month").addEventListener("click", () => {
        if (planningMonthIndex < planningMonths.length - 1) {
          planningMonthIndex += 1;
          semaineOuverteIdx = null;
          renderPlanningMonth();
        }
      });
      panel.querySelector("#planning-newer-month").addEventListener("click", () => {
        if (planningMonthIndex > 0) {
          planningMonthIndex -= 1;
          semaineOuverteIdx = null;
          renderPlanningMonth();
        }
      });
      panel.querySelector("#planning-detail-close")?.addEventListener("click", () => {
        semaineOuverteIdx = null;
        renderPlanningMonth();
      });
    }

    function renderPlanningWeekDetail(weekEntry, todayKey) {
      if (!weekEntry) return "";
      const [weekKey, s] = weekEntry;
      const monday = new Date(weekKey + "T12:00:00");
      const days = Array.from({ length: 7 }, (_, index) => {
        const date = new Date(monday);
        date.setDate(monday.getDate() + index);
        const key = planningDateKey(date);
        return { date, key, sessions: s.jours.filter(item => item.activity_date === key) };
      });

      const daysHtml = days.map(day => {
        const sessionsHtml = day.sessions.length === 0
          ? '<div class="planning-rest">Repos</div>'
          : day.sessions.map(session => {
              const performances = [];
              if (session.avg_power != null) performances.push(`P moy. ${session.avg_power} W`);
              if (session.max_power != null) performances.push(`P max. ${session.max_power} W`);
              if (session.avg_hr != null) performances.push(`FC moy. ${session.avg_hr} bpm`);
              if (session.max_hr != null) performances.push(`FC max. ${session.max_hr} bpm`);
              return `
                <div class="planning-session">
                  <div class="planning-session-title">${escapeHtml(session.type || "Sortie")}</div>
                  <div class="planning-session-meta">${dureeLabel(session.duration_min || 0)} · ${Number(session.distance_km || 0).toFixed(1)} km · charge ${Number(session.charge || 0).toFixed(0)}</div>
                  ${performances.length ? `<div class="planning-session-extra">${performances.join(" · ")}</div>` : ""}
                </div>`;
            }).join("");
        return `
          <div class="planning-day${day.key === todayKey ? " today" : ""}">
            <div class="planning-day-head">
              <span class="planning-day-title">${day.date.toLocaleDateString("fr-FR", { weekday: "short", day: "numeric" })}</span>
              <span class="planning-day-count">${day.sessions.length || "—"}</span>
            </div>
            ${sessionsHtml}
          </div>`;
      }).join("");

      return `
        <div class="planning-detail open" id="planning-week-detail">
          <div class="planning-detail-head">
            <div><div class="planning-detail-title">${s.label} · ${s.sorties} séance(s)</div><div class="planning-detail-sub">${planningWeekRange(weekKey)} · toutes les activités partagées</div></div>
            <button class="planning-detail-close" id="planning-detail-close" type="button">Fermer les détails</button>
          </div>
          <div class="planning-days">${daysHtml}</div>
        </div>`;
    }

    function toggleSemaine(idx) {
      semaineOuverteIdx = semaineOuverteIdx === idx ? null : idx;
      renderPlanningMonth();
    }

    async function rpc(name, token, payload = {}) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
          method: "POST",
          headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ p_token: token, ...payload })
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (e) { return null; }
    }

    async function charger() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const subtitle = document.getElementById("subtitle");

      if (!token) {
        subtitle.innerHTML = '<span class="error">Lien invalide : jeton manquant.</span>';
        return;
      }

      setupTabs();

      const [summaryRows, metricsRows, zonesRows, profileRows, riderProfileRows, messagesRows] = await Promise.all([
        rpc("get_coach_summary", token),
        rpc("get_coach_metrics", token),
        rpc("get_coach_zones", token),
        rpc("get_coach_profile", token),
        rpc("get_coach_rider_profile", token),
        rpc("get_coach_messages", token)
      ]);

      if (summaryRows === null && metricsRows === null && zonesRows === null) {
        subtitle.textContent = "";
        document.getElementById("panel-apercu").innerHTML = '<div class="error">Impossible de charger les données. Réessaie plus tard.</div>';
        return;
      }

      ensureApercuColumns();
      renderApercu(metricsRows || []);
      renderProfilCoureur((riderProfileRows && riderProfileRows[0]) || null);
      renderOverviewSummary(summaryRows || [], metricsRows || [], messagesRows || [], token);
      renderPlanning(summaryRows || []);
      renderZonesV2((zonesRows && zonesRows[0]) || null);
      renderSante(metricsRows || []);

      const nom = profileRows && profileRows[0] && profileRows[0].athlete_name;
      document.querySelector(".brand").textContent = nom ? `ATHIA — ${nom}` : "ATHIA";
      subtitle.textContent = `${(summaryRows || []).length} sortie(s) sur les 12 derniers mois`;
    }

    charger();
  </script>
</body>
</html>
